server:
  port: 8080
spring:
  application:
    name: lifegame-backend
  jackson:
    default-property-inclusion: non_null
session:
  persistence:
    file: ${SESSION_PERSISTENCE_FILE:/app/data/sessions.json}
    interval: ${SESSION_PERSISTENCE_INTERVAL:10}
management:
  endpoints:
    web:
      exposure:
        include: health,info
assets:
  output-dir: ${ASSETS_OUTPUT_DIR:@project.build.directory@/generated-assets}
logging:
  level:
    org.springframework.web.servlet.resource.ResourceHttpRequestHandler: WARN
