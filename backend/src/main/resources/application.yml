server:
  port: 8080

spring:
  application:
    name: life-of-t

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha
  default-produces-media-type: application/json

logging:
  level:
    ru.lifegame: DEBUG
    org.springframework.web: INFO
