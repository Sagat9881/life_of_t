server:
  port: 8080

spring:
  application:
    name: lifegame-backend
  jackson:
    default-property-inclusion: non_null

session:
  persistence:
    file: ${SESSION_PERSISTENCE_FILE:/app/data/sessions.json}
    interval: ${SESSION_PERSISTENCE_INTERVAL:10}

management:
  endpoints:
    web:
      exposure:
        include: health,info

# Assets: filesystem fallback for /assets/** in dev mode.
# StaticResourceConfig reads this via @Value("${assets.output-dir}").
# Points to backend/target/generated-assets where exec-maven-plugin
# writes generated assets during the backend build phase.
# Override in application module or via env var ASSETS_OUTPUT_DIR for prod/docker.
assets:
  output-dir: ${ASSETS_OUTPUT_DIR:${user.dir}/backend/target/generated-assets}
