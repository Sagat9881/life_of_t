name: Test Scripts

on:
  push:
    branches: [main]
    paths:
      - 'scripts/**'
  pull_request:
    paths:
      - 'scripts/**'
  workflow_dispatch:

jobs:
  bats:
    name: bats — scripts unit tests
    runs-on: ubuntu-latest

    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: install bats + jq
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y bats jq

      - name: run tests
        run: |
          bats scripts/tests/
