name: Asset Generator CI

on:
  push:
    paths:
      - 'asset-generator/**'
      - 'docs/prompts/**'
      - '.github/workflows/asset-generator-ci.yml'
  pull_request:
    paths:
      - 'asset-generator/**'
      - 'docs/prompts/**'
  workflow_dispatch:

jobs:
  build-and-test:
    name: Build & Test (Java 21)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Compile asset-generator (mvn clean compile)
        run: mvn -B clean compile -f asset-generator/pom.xml --no-transfer-progress

      - name: Run asset-generator tests (mvn clean test)
        run: mvn -B clean test -f asset-generator/pom.xml --no-transfer-progress -Dsurefire.useModulePath=false

      - name: Upload Surefire reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: asset-generator/target/surefire-reports/
          retention-days: 14

  validate-specs:
    name: Validate XML Specs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install xmllint
        run: sudo apt-get install -y libxml2-utils

      - name: Check all visual-specs.xml files are well-formed XML
        run: |
          EXIT=0
          for f in $(find docs/prompts -name 'visual-specs.xml'); do
            if ! xmllint --noout "$f" 2>/dev/null; then
              echo "::error file=$f::Not well-formed XML"
              EXIT=1
            else
              echo "OK: $f"
            fi
          done
          if [ -f docs/prompts/_core/unified-asset-schema.xml ]; then
            if ! xmllint --noout docs/prompts/_core/unified-asset-schema.xml 2>/dev/null; then
              echo "::error::unified-asset-schema.xml is not well-formed"
              EXIT=1
            else
              echo "OK: docs/prompts/_core/unified-asset-schema.xml"
            fi
          fi
          exit $EXIT

      - name: Verify entity directories have visual-specs.xml
        run: |
          EXPECTED_SPECS=(
            "docs/prompts/characters/tanya/visual-specs.xml"
            "docs/prompts/characters/husband/visual-specs.xml"
            "docs/prompts/pets/garfield/visual-specs.xml"
            "docs/prompts/locations/home/visual-specs.xml"
            "docs/prompts/locations/office/visual-specs.xml"
            "docs/prompts/locations/park/visual-specs.xml"
            "docs/prompts/locations/father_house/visual-specs.xml"
          )
          ALL_OK=true
          for spec in "${EXPECTED_SPECS[@]}"; do
            if [ -f "$spec" ]; then
              echo "OK: $spec"
            else
              echo "::error::MISSING: $spec"
              ALL_OK=false
            fi
          done
          if [ "$ALL_OK" = false ]; then
            exit 1
          fi
          echo "All entity XML specs present."

  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify no wildcard imports in main sources
        run: |
          if grep -rn "import .*\*;" asset-generator/src/main/java/ 2>/dev/null; then
            echo "::error::Wildcard imports found in main sources!"
            exit 1
          fi
          echo "OK — no wildcard imports in main sources."

      - name: Verify no wildcard imports in test sources
        run: |
          if grep -rn "import .*\*;" asset-generator/src/test/java/ 2>/dev/null; then
            echo "::error::Wildcard imports found in test sources!"
            exit 1
          fi
          echo "OK — no wildcard imports in test sources."

      - name: Verify no --enable-preview in asset-generator pom.xml
        run: |
          if grep -q "enable-preview" asset-generator/pom.xml; then
            echo "::error::--enable-preview found in asset-generator/pom.xml!"
            exit 1
          fi
          echo "OK — no preview features."

      - name: Verify no Lombok usage
        run: |
          if grep -rn "import lombok" asset-generator/src/ 2>/dev/null; then
            echo "::error::Lombok imports found!"
            exit 1
          fi
          if grep -q "lombok" asset-generator/pom.xml; then
            echo "::error::Lombok dependency found in pom.xml!"
            exit 1
          fi
          echo "OK — no Lombok."

      - name: Verify RGBA 32-bit compliance
        run: |
          echo "Checking that all BufferedImage creation uses TYPE_INT_ARGB..."
          VIOLATIONS=$(grep -rn "BufferedImage(" asset-generator/src/main/java/ | grep -v "TYPE_INT_ARGB" | grep -v "getType()" || true)
          if [ -n "$VIOLATIONS" ]; then
            echo "::warning::Possible non-ARGB BufferedImage creation:"
            echo "$VIOLATIONS"
          fi
          echo "RGBA compliance check complete."

      - name: Verify max 50 frames constraint
        run: |
          if grep -q "MAX_FRAMES = 50" asset-generator/src/main/java/ru/lifegame/assets/domain/model/asset/AnimationSpec.java; then
            echo "OK — MAX_FRAMES = 50 enforced."
          else
            echo "::error::MAX_FRAMES = 50 not found in AnimationSpec!"
            exit 1
          fi

      - name: Verify unified XML schema exists
        run: |
          if [ ! -f "docs/prompts/_core/unified-asset-schema.xml" ]; then
            echo "::error::Unified XML schema not found!"
            exit 1
          fi
          echo "OK — unified XML schema present."

      - name: Verify Clean Architecture package structure
        run: |
          REQUIRED=(
            "asset-generator/src/main/java/ru/lifegame/assets/domain/model/asset"
            "asset-generator/src/main/java/ru/lifegame/assets/domain/service"
            "asset-generator/src/main/java/ru/lifegame/assets/application/usecase"
            "asset-generator/src/main/java/ru/lifegame/assets/infrastructure/generator"
            "asset-generator/src/main/java/ru/lifegame/assets/infrastructure/parser"
            "asset-generator/src/main/java/ru/lifegame/assets/infrastructure/writer"
            "asset-generator/src/main/java/ru/lifegame/assets/infrastructure/scanner"
            "asset-generator/src/main/java/ru/lifegame/assets/config"
          )
          for pkg in "${REQUIRED[@]}"; do
            if [ -d "$pkg" ]; then
              echo "OK: $pkg"
            else
              echo "::error::MISSING package: $pkg"
              exit 1
            fi
          done
          echo "Clean Architecture structure verified."

  generate-and-push-assets:
    name: Generate & Push Assets
    runs-on: ubuntu-latest
    needs: [build-and-test, validate-specs, code-quality]
    if: github.event_name == 'push' && github.ref == 'refs/heads/master' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Generate assets (mvn generate-resources)
        run: |
          mvn -B generate-resources -f asset-generator/pom.xml \
            --no-transfer-progress \
            -Dasset.generation.skip=false

      - name: Check for generated assets
        id: check-assets
        run: |
          if [ -d "assets" ] && [ "$(ls -A assets 2>/dev/null)" ]; then
            echo "has_assets=true" >> $GITHUB_OUTPUT
            echo "Generated assets found in assets/"
            ls -lR assets/
          else
            echo "has_assets=false" >> $GITHUB_OUTPUT
            echo "No assets generated"
          fi

      - name: Commit and push to assets branch
        if: steps.check-assets.outputs.has_assets == 'true'
        run: |
          TIMESTAMP=$(date +%Y%m%d-%H%M%S)
          BRANCH_NAME="assets/autogen-$TIMESTAMP"
          
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git checkout -b "$BRANCH_NAME"
          git add assets/
          git commit -m "chore: auto-generated assets from commit ${GITHUB_SHA::7}
          
          Generated by GitHub Actions workflow
          Source commit: $GITHUB_SHA
          Workflow run: $GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
          
          git push origin "$BRANCH_NAME"
          
          echo "Assets pushed to branch: $BRANCH_NAME"
