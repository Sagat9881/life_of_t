name: Demo Module CI

on:
  push:
    branches: [ master ]
    paths:
      - 'demo/**'
      - 'backend/**'
      - 'asset-generator/**'
      - '.github/workflows/demo-ci.yml'
  pull_request:
    branches: [ master ]
    paths:
      - 'demo/**'
      - 'backend/**'
      - 'asset-generator/**'

jobs:
  build-and-test:
    name: Build & Test (Java 21)
    runs-on: ubuntu-latest

    env:
      MAVEN_OPTS: >-
        -Xmx1g
        -Djava.awt.headless=true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      # Build backend + asset-generator + demo with reactor
      # Using -pl with -am to build only required modules
      - name: Build demo and dependencies (skip tests)
        run: |
          set -e
          echo "=== Installing parent POM ==="
          mvn -B -N install --no-transfer-progress
          echo ""
          echo "=== Building backend ==="
          mvn -B install -DskipTests -f backend/pom.xml --no-transfer-progress -e
          echo ""
          echo "=== Building asset-generator ==="
          mvn -B install -DskipTests -f asset-generator/pom.xml --no-transfer-progress -e
          echo ""
          echo "=== Building demo (compile) ==="
          mvn -B compile -f demo/pom.xml --no-transfer-progress -e 2>&1 || {
            echo "=== DEMO COMPILE FAILED - trying with full stacktrace ==="
            mvn -B compile -f demo/pom.xml -X 2>&1 | tail -200
            exit 1
          }
          echo ""
          echo "=== Installing demo (skip tests) ==="
          mvn -B install -DskipTests -f demo/pom.xml --no-transfer-progress

      - name: Run demo tests
        run: >-
          mvn -B test
          -f demo/pom.xml
          --no-transfer-progress
          -Dspring.profiles.active=test
          -Ddemo.assets.output-dir=/tmp/life-of-t-assets
          -Dsurefire.excludes=**/DemoBrowserE2ETest.java
        env:
          TESTCONTAINERS_CHECKS_DISABLE: true
          DOCKER_HOST: unix:///var/run/docker.sock

      - name: Run browser E2E tests (optional)
        if: ${{ env.BROWSER_E2E_ENABLED == 'true' }}
        run: >-
          mvn -B test
          -f demo/pom.xml
          --no-transfer-progress
          -Dtest=DemoBrowserE2ETest
          -Dspring.profiles.active=test
          -Ddemo.assets.output-dir=/tmp/life-of-t-assets
        env:
          BROWSER_E2E_ENABLED: ${{ vars.BROWSER_E2E_ENABLED }}
          TESTCONTAINERS_CHECKS_DISABLE: true

      - name: Package demo JAR
        run: >-
          mvn -B package
          -f demo/pom.xml
          -DskipTests
          --no-transfer-progress

      - name: Upload demo JAR
        uses: actions/upload-artifact@v4
        with:
          name: life-of-t-demo
          path: demo/target/life-of-t-demo.jar
          retention-days: 7

      - name: Upload Surefire reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: demo/target/surefire-reports/
          retention-days: 3
