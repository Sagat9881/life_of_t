name: Demo Module CI

on:
  push:
    branches: [ master ]
    paths:
      - 'demo/**'
      - 'backend/**'
      - 'asset-generator/**'
      - '.github/workflows/demo-ci.yml'
  pull_request:
    branches: [ master ]
    paths:
      - 'demo/**'
      - 'backend/**'
      - 'asset-generator/**'

jobs:
  build-and-test:
    name: Build & Test (Java 21)
    runs-on: ubuntu-latest

    env:
      MAVEN_OPTS: >-
        -Xmx1g
        -Djava.awt.headless=true

    steps:
      # ----------------------------------------------------------------
      # 1. Checkout
      # ----------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # ----------------------------------------------------------------
      # 2. Set up Java 21
      # ----------------------------------------------------------------
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      # ----------------------------------------------------------------
      # 3. Install parent POM into local repo
      # ----------------------------------------------------------------
      - name: Install parent POM
        run: mvn -B -N install --no-transfer-progress

      # ----------------------------------------------------------------
      # 4. Build backend module (dependency of demo)
      # ----------------------------------------------------------------
      - name: Build backend module
        run: mvn -B install -DskipTests -f backend/pom.xml --no-transfer-progress

      # ----------------------------------------------------------------
      # 5. Build asset-generator module (dependency of demo)
      # ----------------------------------------------------------------
      - name: Build asset-generator module
        run: mvn -B install -DskipTests -f asset-generator/pom.xml --no-transfer-progress

      # ----------------------------------------------------------------
      # 6. Build demo module (skip tests for compilation check)
      # ----------------------------------------------------------------
      - name: Build demo module (compile only)
        run: mvn -B install -DskipTests -f demo/pom.xml --no-transfer-progress

      # ----------------------------------------------------------------
      # 7. Run unit + E2E tests for the demo module
      #    Testcontainers needs Docker; ubuntu-latest provides it.
      #    DemoBrowserE2ETest is excluded in CI (requires real Chrome).
      # ----------------------------------------------------------------
      - name: Run demo tests
        run: >-
          mvn -B test
          -f demo/pom.xml
          --no-transfer-progress
          -Dspring.profiles.active=test
          -Ddemo.assets.output-dir=/tmp/life-of-t-assets
          -Dsurefire.excludes=**/DemoBrowserE2ETest.java
        env:
          TESTCONTAINERS_CHECKS_DISABLE: true
          DOCKER_HOST: unix:///var/run/docker.sock

      # ----------------------------------------------------------------
      # 8. Browser E2E (optional, only when Docker + Chrome available)
      # ----------------------------------------------------------------
      - name: Run browser E2E tests (optional)
        if: ${{ env.BROWSER_E2E_ENABLED == 'true' }}
        run: >-
          mvn -B test
          -f demo/pom.xml
          --no-transfer-progress
          -Dtest=DemoBrowserE2ETest
          -Dspring.profiles.active=test
          -Ddemo.assets.output-dir=/tmp/life-of-t-assets
        env:
          BROWSER_E2E_ENABLED: ${{ vars.BROWSER_E2E_ENABLED }}
          TESTCONTAINERS_CHECKS_DISABLE: true

      # ----------------------------------------------------------------
      # 9. Package the Spring Boot fat JAR
      # ----------------------------------------------------------------
      - name: Package demo JAR
        run: >-
          mvn -B package
          -f demo/pom.xml
          -DskipTests
          --no-transfer-progress

      # ----------------------------------------------------------------
      # 10. Upload artifacts
      # ----------------------------------------------------------------
      - name: Upload demo JAR
        uses: actions/upload-artifact@v4
        with:
          name: life-of-t-demo
          path: demo/target/life-of-t-demo.jar
          retention-days: 7

      - name: Upload Surefire reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: demo/target/surefire-reports/
          retention-days: 3
