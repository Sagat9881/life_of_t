name: Demo Module CI

on:
  push:
    branches: [ master ]
    paths:
      - 'demo/**'
      - 'backend/**'
      - 'asset-generator/**'
      - '.github/workflows/demo-ci.yml'
  pull_request:
    branches: [ master ]
    paths:
      - 'demo/**'
      - 'backend/**'
      - 'asset-generator/**'

jobs:
  build-and-test:
    name: Build & Test (Java 21)
    runs-on: ubuntu-latest

    env:
      MAVEN_OPTS: >-
        -Xmx1g
        -Djava.awt.headless=true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Install parent POM
        run: mvn -B -N install --no-transfer-progress

      - name: Build and install backend
        run: mvn -B install -DskipTests -f backend/pom.xml --no-transfer-progress

      - name: Build and install asset-generator
        run: mvn -B install -DskipTests -f asset-generator/pom.xml --no-transfer-progress

      - name: Compile demo
        id: compile
        run: |
          mvn -B compile -f demo/pom.xml -e 2>&1 | tee /tmp/compile-output.txt
          exit ${PIPESTATUS[0]}
        continue-on-error: true

      - name: Upload compile output on failure
        if: steps.compile.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: compile-error-output
          path: /tmp/compile-output.txt
          retention-days: 3

      - name: Fail if compile failed
        if: steps.compile.outcome == 'failure'
        run: |
          echo "::error::Demo compilation failed. See compile-error-output artifact for details."
          cat /tmp/compile-output.txt
          exit 1

      - name: Install demo (skip tests)
        run: mvn -B install -DskipTests -f demo/pom.xml --no-transfer-progress

      - name: Run demo tests
        run: >-
          mvn -B test
          -f demo/pom.xml
          --no-transfer-progress
          -Dspring.profiles.active=test
          -Ddemo.assets.output-dir=/tmp/life-of-t-assets
          -Dsurefire.excludes=**/DemoBrowserE2ETest.java
        env:
          TESTCONTAINERS_CHECKS_DISABLE: true
          DOCKER_HOST: unix:///var/run/docker.sock

      - name: Run browser E2E tests (optional)
        if: ${{ env.BROWSER_E2E_ENABLED == 'true' }}
        run: >-
          mvn -B test
          -f demo/pom.xml
          --no-transfer-progress
          -Dtest=DemoBrowserE2ETest
          -Dspring.profiles.active=test
          -Ddemo.assets.output-dir=/tmp/life-of-t-assets
        env:
          BROWSER_E2E_ENABLED: ${{ vars.BROWSER_E2E_ENABLED }}
          TESTCONTAINERS_CHECKS_DISABLE: true

      - name: Package demo JAR
        run: >-
          mvn -B package
          -f demo/pom.xml
          -DskipTests
          --no-transfer-progress

      - name: Upload demo JAR
        uses: actions/upload-artifact@v4
        with:
          name: life-of-t-demo
          path: demo/target/life-of-t-demo.jar
          retention-days: 7

      - name: Upload Surefire reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: demo/target/surefire-reports/
          retention-days: 3
