name: CI Pipeline

on:
  push:
    branches: [main, 'dev/**']
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Frontend - Install
        working-directory: frontend
        run: npm ci

      - name: Frontend - Lint & Test
        working-directory: frontend
        run: |
          npm run test:ci

      - name: Frontend - Build
        working-directory: frontend
        run: npm run build

      - name: Backend - Build & Test
        run: mvn clean verify -pl backend,asset-generator -P ci

      - name: Application - Package
        run: mvn clean package -pl application -am -DskipTests

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: life-of-t-application
          path: application/target/life-of-t-application-*.jar
          retention-days: 30

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            backend/target/surefire-reports/
            backend/target/site/jacoco/
            asset-generator/target/surefire-reports/
          retention-days: 7

  generate-assets:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Generate game assets
        run: mvn spring-boot:run -pl asset-generator -DskipTests

      - name: Upload generated assets
        uses: actions/upload-artifact@v4
        with:
          name: generated-assets
          path: asset-generator/output/
          retention-days: 90
