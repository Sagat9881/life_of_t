name: CI Pipeline

on:
  push:
    branches: [main, 'dev/**']
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Frontend - Install
        working-directory: frontend
        run: npm install

      - name: Frontend - Lint & Test
        working-directory: frontend
        run: npm run test:ci

      - name: Frontend - Build
        working-directory: frontend
        run: npm run build

      - name: Backend - Build & Test
        run: mvn clean verify -pl backend,asset-generator,telegram-bot --also-make -P ci -DskipFrontend

      - name: Application - Package
        run: mvn clean package -pl application -am -DskipTests -DskipFrontend

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: life-of-t-application
          path: application/target/life-of-t-application-*.jar
          retention-days: 30

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            backend/target/surefire-reports/
            backend/target/site/jacoco/
            asset-generator/target/surefire-reports/
            telegram-bot/target/surefire-reports/
          retention-days: 7

  generate-assets:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Generate assets
        run: mvn exec:java -pl asset-generator -Dexec.mainClass=ru.lifegame.assets.AssetGeneratorMain -DskipTests

      - name: Upload generated assets
        uses: actions/upload-artifact@v4
        with:
          name: generated-assets
          path: asset-generator/target/generated-assets/
          retention-days: 30
