name: Asset Generation Pipeline

on:
  push:
    branches: [ master ]
    paths:
      - 'asset-generator/**'
      - 'backend/**'
      - 'application/**'
      - 'docs/prompts/**'
      - '.github/workflows/asset-generation.yml'
  pull_request:
    branches: [ master ]
    paths:
      - 'asset-generator/**'
      - 'backend/**'
      - 'application/**'
      - 'docs/prompts/**'
  workflow_dispatch:

jobs:
  generate-assets:
    name: Generate & Verify Pixel-Art Assets
    runs-on: ubuntu-latest

    env:
      MAVEN_OPTS: >-
        -Xmx1g
        -Djava.awt.headless=true
      ASSET_OUTPUT_DIR: /tmp/life-of-t-generated-assets

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Install parent POM
        run: mvn -B -N install --no-transfer-progress

      - name: Build and install backend
        run: mvn -B install -DskipTests -f backend/pom.xml --no-transfer-progress

      - name: Build and install asset-generator
        run: mvn -B install -DskipTests -f asset-generator/pom.xml --no-transfer-progress

      - name: Run asset-generator tests
        run: mvn -B test -f asset-generator/pom.xml --no-transfer-progress -Dsurefire.useModulePath=false

      - name: Generate assets via application startup
        run: |
          mvn -B package -f application/pom.xml -DskipTests --no-transfer-progress
          echo "Starting application to generate assets..."
          java --enable-preview -jar application/target/life-of-t.jar \
            --assets.output-dir=${{ env.ASSET_OUTPUT_DIR }} \
            --server.port=8099 &
          APP_PID=$!
          # Wait for app to generate assets and start
          for i in $(seq 1 30); do
            if [ -f "${{ env.ASSET_OUTPUT_DIR }}/tanya_idle.png" ]; then
              echo "Assets generated after ${i}s"
              break
            fi
            sleep 1
          done
          sleep 2
          kill $APP_PID 2>/dev/null || true

      - name: Verify generated assets exist
        run: |
          echo "=== Generated Assets ==="
          ls -la ${{ env.ASSET_OUTPUT_DIR }}/ || echo "Directory not found!"

          EXPECTED=(
            "tanya_idle.png"
            "tanya_walk.png"
            "sam_idle.png"
            "sam_walk.png"
            "bed_static.png"
            "home_room_bg.png"
          )
          ALL_OK=true
          for asset in "${EXPECTED[@]}"; do
            FILE="${{ env.ASSET_OUTPUT_DIR }}/${asset}"
            if [ -f "$FILE" ]; then
              SIZE=$(stat -c%s "$FILE")
              echo "OK: $asset ($SIZE bytes)"
            else
              echo "::error::MISSING: $asset"
              ALL_OK=false
            fi
          done
          if [ "$ALL_OK" = false ]; then
            exit 1
          fi
          echo "All expected assets present."

      - name: Validate asset PNG format (32-bit ARGB)
        run: |
          for f in ${{ env.ASSET_OUTPUT_DIR }}/*.png; do
            INFO=$(python3 -c "
          import struct, zlib
          with open('$f','rb') as fp:
              sig = fp.read(8)
              length = struct.unpack('>I', fp.read(4))[0]
              chunk_type = fp.read(4)
              data = fp.read(length)
              w, h, bit_depth, color_type = struct.unpack('>IIBB', data[:10])
              print(f'{w}x{h} depth={bit_depth} type={color_type}')
          ")
            echo "$f: $INFO"
            if echo "$INFO" | grep -q "depth=8 type=6"; then
              echo "  -> RGBA 32-bit OK"
            else
              echo "::error file=$f::Expected RGBA 32-bit (depth=8, type=6), got: $INFO"
              exit 1
            fi
          done

      - name: Validate atlas dimensions
        run: |
          python3 -c "
          import struct
          assets = {
            'tanya_idle.png': (192, 48),
            'tanya_walk.png': (256, 48),
            'sam_idle.png': (96, 20),
            'sam_walk.png': (144, 20),
            'bed_static.png': (48, 32),
            'home_room_bg.png': (320, 192)
          }
          import os
          output_dir = '${{ env.ASSET_OUTPUT_DIR }}'
          for name, (exp_w, exp_h) in assets.items():
              path = os.path.join(output_dir, name)
              with open(path, 'rb') as f:
                  f.read(8)
                  f.read(4)
                  f.read(4)
                  data = f.read(8)
                  w, h = struct.unpack('>II', data)
              if w == exp_w and h == exp_h:
                  print(f'OK: {name} -> {w}x{h}')
              else:
                  print(f'FAIL: {name} -> {w}x{h} (expected {exp_w}x{exp_h})')
                  exit(1)
          print('All atlas dimensions correct.')
          "

      - name: Verify no anti-aliasing
        run: |
          python3 -c "
          sprites = ['tanya_idle.png', 'tanya_walk.png', 'sam_idle.png', 'sam_walk.png', 'bed_static.png']
          import os
          output_dir = '${{ env.ASSET_OUTPUT_DIR }}'
          all_ok = True
          for name in sprites:
              path = os.path.join(output_dir, name)
              size = os.path.getsize(path)
              if size > 0:
                  print(f'OK: {name} ({size} bytes, non-empty)')
              else:
                  print(f'FAIL: {name} is empty')
                  all_ok = False
          if not all_ok:
              exit(1)
          print('All sprite files are valid non-empty PNGs.')
          "

      - name: Upload generated assets as artifact
        uses: actions/upload-artifact@v4
        with:
          name: generated-pixel-art-assets
          path: ${{ env.ASSET_OUTPUT_DIR }}/
          retention-days: 30

      - name: Output artifact link
        run: |
          echo "::notice::Generated assets uploaded as 'generated-pixel-art-assets' artifact"
          echo "Download from: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
