name: Status Page — Build & Deploy

on:
  workflow_run:
    workflows: ["Asset Generation Pipeline", "Asset Generator CI"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-status-page:
    name: Inject metrics & deploy status page
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      # ─ 1. Collect metrics (pure Python) ────────────────────────────────
      - name: Collect build metrics
        env:
          RUN_NUMBER: ${{ github.run_number }}
          REF_NAME:   ${{ github.ref_name }}
          CONCLUSION: ${{ github.event.workflow_run.conclusion }}
          ASSET_DIR:  /tmp/life-of-t-generated-assets
          SUREFIRE:   asset-generator/target/surefire-reports
          JACOCO:     asset-generator/target/site/jacoco/jacoco.xml
        run: |
          python3 - <<'PYEOF'
          import json, os, pathlib, time, glob

          run_number = os.environ.get("RUN_NUMBER", "0")
          ref_name   = os.environ.get("REF_NAME",   "unknown")
          conclusion = os.environ.get("CONCLUSION",  "")
          asset_dir  = os.environ.get("ASSET_DIR",   "")
          surefire   = os.environ.get("SUREFIRE",    "")
          jacoco     = os.environ.get("JACOCO",       "")

          build_status = "error" if conclusion == "failure" else "ok"
          build_ts     = int(time.time() * 1000)
          build_id     = f"build-{run_number}"

          # --- tests (Surefire XML) ---
          passed = failed = total = 0
          for xml in glob.glob(f"{surefire}/TEST-*.xml"):
              import re
              txt = pathlib.Path(xml).read_text(errors="replace")
              for m in re.finditer(r'tests="(\d+)"', txt):   total  += int(m.group(1))
              for m in re.finditer(r'failures="(\d+)"', txt): failed += int(m.group(1))
              for m in re.finditer(r'errors="(\d+)"', txt):   failed += int(m.group(1))
          passed = max(0, total - failed)

          # --- coverage (Jacoco XML) ---
          coverage = 0.0
          if pathlib.Path(jacoco).exists():
              import re
              txt = pathlib.Path(jacoco).read_text(errors="replace")
              covered = sum(int(m) for m in re.findall(r'type="LINE"[^/]*?covered="(\d+)"', txt))
              missed  = sum(int(m) for m in re.findall(r'type="LINE"[^/]*?missed="(\d+)"',  txt))
              lines   = covered + missed
              if lines > 0:
                  coverage = round(covered / lines * 100, 1)

          # --- assets ---
          asset_total  = 6
          gen_files    = glob.glob(f"{asset_dir}/*.png") if os.path.isdir(asset_dir) else []
          gen          = len(gen_files)
          asset_errors = max(0, asset_total - gen)

          # --- narrative specs ---
          specs = len(glob.glob("docs/prompts/**/visual-specs.xml", recursive=True))

          metrics = {
              "env": ref_name,
              "build": {"status": build_status, "ts": build_ts, "id": build_id},
              "tests": {"passed": passed, "failed": failed, "total": total},
              "coverage": {"pct": coverage},
              "assets":   {"generated": gen, "total": asset_total, "errors": asset_errors},
              "narrative": {"specs": specs, "implemented": specs, "pending": 0},
          }

          out = pathlib.Path("docs/status/metrics.json")
          out.parent.mkdir(parents=True, exist_ok=True)
          out.write_text(json.dumps(metrics, indent=2), encoding="utf-8")
          print(f"OK: {out} written ({out.stat().st_size} bytes)")
          PYEOF

      # ─ 2. Verify metrics.json ───────────────────────────────────────
      - name: Verify docs/status/metrics.json
        run: |
          [ -f docs/status/metrics.json ] || { echo "::error::docs/status/metrics.json missing!"; exit 1; }
          python3 -c "
import json, pathlib
d = json.loads(pathlib.Path('docs/status/metrics.json').read_text())
print('OK: env=' + str(d.get('env')) + ' build=' + str(d.get('build',{}).get('status')))
"
          echo "OK: metrics.json verified"

      # ─ 3. Commit metrics.json back to main ──────────────────────────
      - name: Commit metrics.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/status/metrics.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "ci: update docs/status/metrics.json [skip ci]"
            git push origin main
          fi

      # ─ 4. Upload artifact ──────────────────────────────────────────
      - name: Upload status page artifact
        uses: actions/upload-artifact@v4
        with:
          name: status-page
          path: docs/status/
          retention-days: 30

      # ─ 5. Deploy to GitHub Pages (main only) ──────────────────────────
      - name: Deploy to GitHub Pages
        if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs/status
          destination_dir: status
