name: Status Page — Build & Deploy

on:
  workflow_run:
    workflows: ["Asset Generation Pipeline", "Asset Generator CI"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  update-metrics:
    name: Update metrics.json
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Write docs/status/metrics.json
        run: |
          python3 << 'EOF'
          import json, os, pathlib, time, glob, re

          build_status = "ok"
          if os.environ.get("CONCLUSION") == "failure":
              build_status = "error"

          build_id = "build-" + os.environ.get("RUN_NUMBER", "0")
          build_ts = int(time.time() * 1000)
          ref_name = os.environ.get("REF_NAME", "main")

          # tests
          passed = failed = total = 0
          for f in glob.glob("asset-generator/target/surefire-reports/TEST-*.xml"):
              txt = pathlib.Path(f).read_text(errors="replace")
              for m in re.finditer(r'tests="(\d+)"', txt):    total  += int(m.group(1))
              for m in re.finditer(r'failures="(\d+)"', txt): failed += int(m.group(1))
              for m in re.finditer(r'errors="(\d+)"', txt):   failed += int(m.group(1))
          passed = max(0, total - failed)

          # coverage
          coverage = 0.0
          jacoco = "asset-generator/target/site/jacoco/jacoco.xml"
          if pathlib.Path(jacoco).exists():
              txt     = pathlib.Path(jacoco).read_text(errors="replace")
              covered = sum(int(m) for m in re.findall(r'type="LINE"[^/]*?covered="(\d+)"', txt))
              missed  = sum(int(m) for m in re.findall(r'type="LINE"[^/]*?missed="(\d+)"', txt))
              lines   = covered + missed
              if lines > 0:
                  coverage = round(covered / lines * 100, 1)

          # assets
          asset_total = 6
          asset_dir   = "/tmp/life-of-t-generated-assets"
          gen         = len(glob.glob(asset_dir + "/*.png")) if os.path.isdir(asset_dir) else 0
          errors      = max(0, asset_total - gen)

          # narrative
          specs = len(glob.glob("docs/prompts/**/visual-specs.xml", recursive=True))

          data = {
              "env": ref_name,
              "build": {"status": build_status, "ts": build_ts, "id": build_id},
              "tests": {"passed": passed, "failed": failed, "total": total},
              "coverage": {"pct": coverage},
              "assets": {"generated": gen, "total": asset_total, "errors": errors},
              "narrative": {"specs": specs, "implemented": specs, "pending": 0},
          }

          out = pathlib.Path("docs/status/metrics.json")
          out.parent.mkdir(parents=True, exist_ok=True)
          out.write_text(json.dumps(data, indent=2), encoding="utf-8")
          print(json.dumps(data, indent=2))
          print("OK: docs/status/metrics.json written")
          EOF
        env:
          RUN_NUMBER: ${{ github.run_number }}
          REF_NAME:   ${{ github.ref_name }}
          CONCLUSION: ${{ github.event.workflow_run.conclusion }}

      - name: Commit and push metrics.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/status/metrics.json
          git diff --cached --quiet && echo "No changes" || (
            git commit -m "ci: update metrics.json [skip ci]" &&
            git push origin main
          )

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: status-page
          path: docs/status/
          retention-days: 30
