name: Status Page — Build & Deploy

on:
  workflow_run:
    workflows: ["Asset Generation Pipeline", "Asset Generator CI"]
    types: [completed]
  workflow_dispatch:

jobs:
  build-status-page:
    name: Inject metrics & deploy status page
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ─ 1. Collect metrics (pure Python, no heredoc, no cp) ───────────────
      - name: Collect build metrics
        env:
          RUN_NUMBER: ${{ github.run_number }}
          REF_NAME:   ${{ github.ref_name }}
          CONCLUSION: ${{ github.event.workflow_run.conclusion }}
          ASSET_DIR:  /tmp/life-of-t-generated-assets
          SUREFIRE:   asset-generator/target/surefire-reports
          JACOCO:     asset-generator/target/site/jacoco/jacoco.xml
        run: |
          python3 - <<'PYEOF'
          import json, os, pathlib, time, glob

          run_number = os.environ.get("RUN_NUMBER", "0")
          ref_name   = os.environ.get("REF_NAME",   "unknown")
          conclusion = os.environ.get("CONCLUSION",  "")
          asset_dir  = os.environ.get("ASSET_DIR",   "")
          surefire   = os.environ.get("SUREFIRE",    "")
          jacoco     = os.environ.get("JACOCO",       "")

          build_status = "error" if conclusion == "failure" else "ok"
          build_ts     = int(time.time() * 1000)
          build_id     = f"build-{run_number}"

          # --- tests (Surefire XML) ---
          passed = failed = total = 0
          for xml in glob.glob(f"{surefire}/TEST-*.xml"):
              import re
              txt = pathlib.Path(xml).read_text(errors="replace")
              for m in re.finditer(r'tests="(\d+)"', txt):   total  += int(m.group(1))
              for m in re.finditer(r'failures="(\d+)"', txt): failed += int(m.group(1))
              for m in re.finditer(r'errors="(\d+)"', txt):   failed += int(m.group(1))
          passed = max(0, total - failed)

          # --- coverage (Jacoco XML) ---
          coverage = 0.0
          if pathlib.Path(jacoco).exists():
              import re
              txt = pathlib.Path(jacoco).read_text(errors="replace")
              covered = sum(int(m) for m in re.findall(r'type="LINE"[^/]*?covered="(\d+)"', txt))
              missed  = sum(int(m) for m in re.findall(r'type="LINE"[^/]*?missed="(\d+)"',  txt))
              lines   = covered + missed
              if lines > 0:
                  coverage = round(covered / lines * 100, 1)

          # --- assets ---
          asset_total  = 6
          gen_files    = glob.glob(f"{asset_dir}/*.png") if os.path.isdir(asset_dir) else []
          gen          = len(gen_files)
          asset_errors = max(0, asset_total - gen)

          # --- narrative specs ---
          specs = len(glob.glob("docs/prompts/**/visual-specs.xml", recursive=True))

          metrics = {
              "env": ref_name,
              "build": {"status": build_status, "ts": build_ts, "id": build_id},
              "tests": {"passed": passed, "failed": failed, "total": total},
              "coverage": {"pct": coverage},
              "assets":   {"generated": gen, "total": asset_total, "errors": asset_errors},
              "narrative": {"specs": specs, "implemented": specs, "pending": 0},
          }

          pathlib.Path("dist").mkdir(exist_ok=True)
          out = pathlib.Path("dist/metrics.json")
          out.write_text(json.dumps(metrics, indent=2), encoding="utf-8")
          print(f"OK: {out} written ({out.stat().st_size} bytes)")
          PYEOF

      # ─ 2. Build assets manifest (pure Python) ───────────────────────
      - name: Build assets manifest
        env:
          ASSET_DIR: /tmp/life-of-t-generated-assets
        run: |
          python3 - <<'PYEOF'
          import json, os, pathlib

          asset_dir = os.environ.get("ASSET_DIR", "")
          items = []

          if os.path.isdir(asset_dir):
              for fname in sorted(os.listdir(asset_dir)):
                  fpath = os.path.join(asset_dir, fname)
                  if not os.path.isfile(fpath):
                      continue
                  ext = pathlib.Path(fname).suffix.lstrip(".").lower()
                  items.append({
                      "name":  fname,
                      "path":  fname,
                      "type":  ext,
                      "size":  os.path.getsize(fpath),
                      "url":   "",
                      "error": False,
                      "warn":  False,
                  })

          manifest = {"assets": items, "total": len(items)}
          out = pathlib.Path("dist/assets-manifest.json")
          out.parent.mkdir(exist_ok=True)
          out.write_text(json.dumps(manifest, indent=2), encoding="utf-8")
          print(f"OK: {out} — {len(items)} asset(s)")
          PYEOF

      # ─ 3. Inject JSON into HTML template (pure Python, no cp) ─────────
      - name: Inject JSON into HTML template
        run: |
          python3 - <<'PYEOF'
          import pathlib

          # SOURCE  : frontend/status/index.template.html  (template, never modified)
          # OUTPUT  : dist/index.html                      (generated output)
          # These are ALWAYS different paths — no self-copy possible.

          src  = pathlib.Path("frontend/status/index.template.html")
          out  = pathlib.Path("dist/index.html")
          metr = pathlib.Path("dist/metrics.json")
          mani = pathlib.Path("dist/assets-manifest.json")

          if not src.exists():
              raise FileNotFoundError(f"Template missing: {src}")

          html     = src.read_text(encoding="utf-8")
          metrics  = metr.read_text(encoding="utf-8")
          manifest = mani.read_text(encoding="utf-8")

          html = html.replace(
              "<!-- METRICS_JSON_PLACEHOLDER -->",
              f'<script id="metrics-data" type="application/json">{metrics}</script>'
          ).replace(
              "<!-- ASSETS_MANIFEST_PLACEHOLDER -->",
              f'<script id="assets-manifest-data" type="application/json">{manifest}</script>'
          )

          out.parent.mkdir(exist_ok=True)
          out.write_text(html, encoding="utf-8")
          print(f"OK: {out} — {out.stat().st_size} bytes")

          remaining = html.count("_PLACEHOLDER -->")
          if remaining:
              raise RuntimeError(f"{remaining} placeholder(s) unreplaced in output!")
          print("OK: all placeholders replaced")
          PYEOF

      # ─ 4. Verify output ──────────────────────────────────────────────
      - name: Verify dist/index.html
        run: |
          [ -f dist/index.html ] || { echo "::error::dist/index.html missing!"; exit 1; }
          grep -q 'id="metrics-data"'         dist/index.html || { echo "::error::metrics-data tag missing!";   exit 1; }
          grep -q 'id="assets-manifest-data"' dist/index.html || { echo "::error::manifest-data tag missing!";  exit 1; }
          grep -q '_PLACEHOLDER -->'          dist/index.html && { echo "::error::unreplaced placeholder!";     exit 1; } || true
          echo "OK: dist/index.html verified"

      # ─ 5. Upload artifact ─────────────────────────────────────────────
      - name: Upload status page artifact
        uses: actions/upload-artifact@v4
        with:
          name: status-page
          path: dist/
          retention-days: 30

      # ─ 6. Deploy to GitHub Pages (main only) ────────────────────────
      - name: Deploy to GitHub Pages
        if: github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          destination_dir: status
