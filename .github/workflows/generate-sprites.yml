name: Generate LPC Sprites

on:
  push:
    branches: [ main, dev/*, feature/* ]
    paths:
      - 'lpc-sprite-compositor/**'
      - 'lpc-spritesheets/**'
      - '.github/workflows/generate-sprites.yml'
  pull_request:
    branches: [ main, dev/* ]
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
      
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
      
      - name: Build lpc-sprite-compositor
        run: |
          cd lpc-sprite-compositor
          mvn clean install -DskipTests
      
      - name: Generate sprites
        run: |
          cd lpc-sprite-compositor
          mvn exec:java -Dexec.mainClass="ru.lifegame.lpc.compositor.PreGenerateSprites" \
            -Dexec.args="sprite-presets.json target/generated-sprites"
      
      - name: Upload generated sprites
        uses: actions/upload-artifact@v4
        with:
          name: lpc-sprites
          path: lpc-sprite-compositor/target/generated-sprites/*.png
          retention-days: 30
      
      - name: Display generation stats
        run: |
          echo "=== Generated Sprites ==="
          ls -lh lpc-sprite-compositor/target/generated-sprites/
          echo "Total sprites: $(ls lpc-sprite-compositor/target/generated-sprites/*.png | wc -l)"