name: Build and Test

on:
  push:
    branches: [ main, dev/*, feature/* ]
  pull_request:
    branches: [ main, dev/* ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'
      
      - name: Build with Maven
        run: mvn clean install -DskipTests
      
      - name: Run tests
        run: mvn test
      
      - name: Check demo JAR
        run: |
          ls -lh demo/target/life-of-t-demo.jar
          echo "✅ Demo JAR created successfully"
      
      - name: Upload demo artifact
        uses: actions/upload-artifact@v4
        with:
          name: life-of-t-demo
          path: demo/target/life-of-t-demo.jar
          retention-days: 7
