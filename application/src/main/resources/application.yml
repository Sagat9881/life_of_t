# Application configuration

spring:
  application:
    name: life-of-t

server:
  port: 8080
  compression:
    enabled: true
    mime-types:
      - application/json
      - application/javascript
      - text/css
      - text/html
      - image/png
      - audio/ogg
      - audio/mpeg
    min-response-size: 1024

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized

# Logging
logging:
  level:
    ru.lifegame: INFO
    org.springframework: WARN
  pattern:
    console: '%d{yyyy-MM-dd HH:mm:ss} - %msg%n'
