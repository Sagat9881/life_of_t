# Application configuration

spring:
  application:
    name: life-of-t
  main:
    allow-bean-definition-overriding: true

server:
  port: 8080
  compression:
    enabled: true
    mime-types:
      - application/json
      - application/javascript
      - text/css
      - text/html
      - image/png
      - audio/ogg
      - audio/mpeg
    min-response-size: 1024

# Asset generation output.
# Backend module writes generated assets to backend/target/generated-assets
# during the generate-resources Maven phase (exec-maven-plugin).
# StaticResourceConfig uses this path as filesystem fallback for /assets/**
# so that dev-mode hot-reload picks up freshly generated files without
# requiring a full jar repack.
# Override via ASSETS_OUTPUT_DIR env var for Docker / prod deployments.
assets:
  output-dir: ${ASSETS_OUTPUT_DIR:${user.dir}/backend/target/generated-assets}

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized

# Logging
logging:
  level:
    ru.lifegame: INFO
    org.springframework: WARN
  pattern:
    console: '%d{yyyy-MM-dd HH:mm:ss} - %msg%n'
