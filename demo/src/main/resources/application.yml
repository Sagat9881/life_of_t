spring:
  application:
    name: life-of-t-demo
  web:
    resources:
      static-locations:
        - classpath:/static/
        - classpath:/public/

server:
  port: 8080
  servlet:
    context-path: /

# Demo-specific configuration
demo:
  assets:
    # Output directory for generated sprite atlas PNGs.
    # Points to asset-generator build output by default.
    # Override with -Ddemo.assets.output-dir=/path/to/assets
    output-dir: ${user.dir}/asset-generator/target/generated-assets

logging:
  level:
    ru.lifegame: DEBUG
    org.springframework.web: INFO
