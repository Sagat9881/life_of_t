spring:
  application:
    name: life-of-t-demo
  web:
    resources:
      static-locations:
        - classpath:/static/
        - classpath:/public/

server:
  port: 8080
  servlet:
    context-path: /

# Demo-specific configuration
demo:
  assets:
    # Output directory for generated sprite atlas PNGs.
    # Defaults to OS temp dir so tests and CI work without filesystem permissions.
    output-dir: ${java.io.tmpdir}/life-of-t-assets

logging:
  level:
    ru.lifegame: DEBUG
    org.springframework.web: INFO
