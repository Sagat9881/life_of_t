<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Life of T — Demo</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 100%; height: 100%; background: #0d0d14; color: #e0d8c8; font-family: 'Courier New', Courier, monospace; }

#app { display: grid; grid-template-columns: 1fr 300px; grid-template-rows: auto 1fr; height: 100vh; gap: 0; }
#header { grid-column: 1/-1; background: #1a1a2e; border-bottom: 2px solid #4a3e6a; padding: 10px 20px; display: flex; align-items: center; gap: 16px; }
#header h1 { font-size: 1.4rem; color: #c8a0ff; letter-spacing: 2px; text-transform: uppercase; }
#header .subtitle { color: #7a6890; font-size: 0.75rem; }
#game-time { margin-left: auto; color: #8be0b4; font-size: 0.85rem; }

#room-container {
    position: relative;
    background: #1c2a3a;
    overflow: hidden;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
}

#room-bg {
    position: absolute; inset: 0;
    background-size: 100% 100%;
    background-repeat: no-repeat;
    image-rendering: pixelated;
}

.scene-element {
    position: absolute;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
    background-repeat: no-repeat;
    pointer-events: none;
}

.sprite {
    position: absolute;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
    background-repeat: no-repeat;
    transition: none;
}

.sprite.clickable { cursor: pointer; }
.sprite.clickable:hover { filter: brightness(1.3) drop-shadow(0 0 6px rgba(200,160,255,0.5)); }
.sprite.clickable:active { filter: brightness(1.5); transform: scale(0.97); }

.activity-icon {
    position: absolute;
    font-size: 18px;
    pointer-events: none;
    text-shadow: 1px 1px 2px rgba(0,0,0,0.7);
    transition: opacity 0.3s;
    z-index: 10;
}

#side-panel {
    background: #12121e;
    border-left: 2px solid #2a2a4a;
    padding: 12px;
    overflow-y: auto;
    display: flex; flex-direction: column; gap: 10px;
}
.panel-box {
    background: #1a1a30;
    border: 1px solid #3a3a5a;
    border-radius: 2px;
    padding: 10px;
}
.panel-box h2 {
    font-size: 0.7rem; text-transform: uppercase;
    letter-spacing: 1px; color: #8070a0;
    margin-bottom: 8px;
    border-bottom: 1px solid #2a2a4a;
    padding-bottom: 4px;
}
.stat-row { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; }
.stat-label { font-size: 0.65rem; color: #a098b8; width: 70px; flex-shrink: 0; }
.stat-bar-bg { flex: 1; height: 6px; background: #2a2a3a; position: relative; }
.stat-bar { height: 6px; transition: width 0.5s ease; }
.stat-energy  .stat-bar { background: #80e880; }
.stat-health  .stat-bar { background: #e84040; }
.stat-stress  .stat-bar { background: #e8a040; }
.stat-mood    .stat-bar { background: #40a8e8; }
.stat-money   .stat-bar { background: #e8e040; }
.stat-esteem  .stat-bar { background: #c840e8; }
.stat-value { font-size: 0.6rem; color: #706890; width: 24px; text-align: right; }

.quest-item { margin-bottom: 8px; }
.quest-title { font-size: 0.7rem; color: #d0c0ff; margin-bottom: 3px; }
.quest-type-badge { display: inline-block; font-size: 0.55rem; padding: 1px 4px; border-radius: 1px; margin-bottom: 4px; }
.quest-SELF_CARE_ARC  { background: #2a4a2a; color: #80e880; }
.quest-FAMILY_HARMONY { background: #4a2a2a; color: #e88080; }
.quest-CAREER_GROWTH  { background: #2a3a4a; color: #80c0e8; }
.quest-progress-bg { width: 100%; height: 4px; background: #2a2a3a; margin-bottom: 4px; }
.quest-progress-fill { height: 4px; background: #8060c0; transition: width 0.5s ease; }
.quest-step { font-size: 0.6rem; color: #706890; padding-left: 6px; margin-bottom: 1px; }
.quest-step.done { color: #50e890; }
.quest-step::before { content: '▸ '; }
.quest-step.done::before { content: '✓ '; }

.rel-row { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; }
.rel-label { font-size: 0.65rem; color: #a098b8; width: 70px; flex-shrink: 0; }
.rel-hearts { font-size: 0.7rem; color: #e84060; transition: all 0.3s; }

#status-bar {
    position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%);
    background: rgba(0,0,0,0.6); border: 1px solid #3a3a5a;
    padding: 4px 12px; font-size: 0.65rem; color: #8080a0; pointer-events: none;
    transition: all 0.3s; z-index: 20;
}
#loading {
    position: fixed; inset: 0; background: #0d0d14;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    z-index: 100; transition: opacity 0.4s;
}
#loading.hidden { opacity: 0; pointer-events: none; }
#loading-text { color: #c8a0ff; font-size: 1rem; margin-bottom: 12px; }
#loading-dots { color: #7a6890; font-size: 0.8rem; }

#room-container::after {
    content: ''; position: absolute; inset: 0;
    background: repeating-linear-gradient(0deg, rgba(0,0,0,0.05) 0px, rgba(0,0,0,0.05) 1px, transparent 1px, transparent 2px);
    pointer-events: none; z-index: 5;
}

.sprite-label {
    position: absolute; font-size: 9px; color: #a098b8;
    text-align: center; pointer-events: none;
    text-shadow: 1px 1px 0 #000; white-space: nowrap;
    z-index: 10;
}

.sprite-placeholder {
    border: 2px dashed rgba(200,160,255,0.3);
    display: flex; align-items: center; justify-content: center;
    font-size: 24px;
}

.interaction-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.5);
    z-index: 50; display: flex; align-items: center; justify-content: center;
    opacity: 0; transition: opacity 0.25s;
    pointer-events: none;
}
.interaction-overlay.visible { opacity: 1; pointer-events: all; }

.interaction-modal {
    background: #1a1a30; border: 2px solid #6040a0;
    border-radius: 4px; padding: 0; width: 360px; max-width: 90vw;
    box-shadow: 0 8px 32px rgba(0,0,0,0.6);
    transform: translateY(20px); transition: transform 0.25s;
}
.interaction-overlay.visible .interaction-modal { transform: translateY(0); }

.modal-header {
    display: flex; align-items: center; gap: 10px;
    padding: 12px 16px; border-bottom: 1px solid #3a3a5a;
    background: #22224a;
}
.modal-avatar { font-size: 28px; }
.modal-name { font-size: 0.9rem; color: #c8a0ff; font-weight: bold; }
.modal-close {
    margin-left: auto; background: none; border: none;
    color: #706890; font-size: 1.2rem; cursor: pointer;
    padding: 4px 8px;
}
.modal-close:hover { color: #c8a0ff; }

.modal-body { padding: 16px; }
.modal-desc { font-size: 0.75rem; color: #a098b8; margin-bottom: 12px; line-height: 1.4; }

.action-btn {
    display: block; width: 100%; padding: 10px 14px;
    margin-bottom: 6px; background: #2a2a50; border: 1px solid #4a3e6a;
    border-radius: 3px; color: #d0c0ff; font-size: 0.8rem;
    font-family: inherit; cursor: pointer; text-align: left;
    transition: all 0.15s;
}
.action-btn:hover { background: #3a3a6a; border-color: #8060c0; transform: translateX(4px); }
.action-btn:active { background: #4a4a7a; }
.action-btn .action-cost {
    float: right; font-size: 0.65rem; color: #706890;
}
.action-btn:disabled {
    opacity: 0.4; cursor: not-allowed;
    transform: none !important; background: #1a1a30 !important;
}

.modal-narrative {
    padding: 16px; font-size: 0.75rem; color: #c8c0d8;
    line-height: 1.5; min-height: 60px;
    border-top: 1px solid #3a3a5a;
    background: #161630;
}
.modal-narrative .stat-change {
    display: inline-block; font-size: 0.65rem; padding: 1px 4px;
    border-radius: 2px; margin: 0 2px;
}
.modal-narrative .stat-change.positive { background: #1a3a1a; color: #80e880; }
.modal-narrative .stat-change.negative { background: #3a1a1a; color: #e88080; }

#debug-bar {
    position: fixed; bottom: 0; left: 0;
    display: flex; gap: 2px; z-index: 60;
    background: rgba(0,0,0,0.7); padding: 4px;
    border-radius: 0 4px 0 0;
}
.dbg-btn {
    width: 28px; height: 28px; border-radius: 4px;
    border: 1px solid #3a3a5a; background: #1a1a30;
    color: #a098b8; font-size: 14px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
}
.dbg-btn:hover { background: #3a3a6a; color: #c8a0ff; }
</style>
</head>
<body>
<div id="app">
    <div id="header">
        <h1>Life of T</h1>
        <span class="subtitle">Demo v0.9</span>
        <div id="game-time">День 1 | 08:00</div>
    </div>
    <div id="room-container">
        <div id="room-bg"></div>
        <!-- Characters -->
        <div id="tanya" class="sprite clickable"></div>
        <span id="label-tanya" class="sprite-label">Таня</span>
        <span id="activity-tanya" class="activity-icon"></span>

        <div id="alexander" class="sprite clickable"></div>
        <span id="label-alexander" class="sprite-label">Александр</span>
        <span id="activity-alexander" class="activity-icon"></span>

        <div id="sam" class="sprite clickable"></div>
        <span id="label-sam" class="sprite-label">Сэм</span>
        <span id="activity-sam" class="activity-icon"></span>

        <div id="status-bar">Кликни на персонажа для взаимодействия</div>
    </div>
    <div id="side-panel">
        <div class="panel-box" id="stats-box">
            <h2>Таня — Статы</h2>
            <div class="stat-row stat-energy"><span class="stat-label">Энергия</span><div class="stat-bar-bg"><div class="stat-bar" id="bar-energy"></div></div><span class="stat-value" id="val-energy">100</span></div>
            <div class="stat-row stat-health"><span class="stat-label">Здоровье</span><div class="stat-bar-bg"><div class="stat-bar" id="bar-health"></div></div><span class="stat-value" id="val-health">100</span></div>
            <div class="stat-row stat-stress"><span class="stat-label">Стресс</span><div class="stat-bar-bg"><div class="stat-bar" id="bar-stress"></div></div><span class="stat-value" id="val-stress">0</span></div>
            <div class="stat-row stat-mood"><span class="stat-label">Настроение</span><div class="stat-bar-bg"><div class="stat-bar" id="bar-mood"></div></div><span class="stat-value" id="val-mood">80</span></div>
            <div class="stat-row stat-money"><span class="stat-label">Деньги</span><div class="stat-bar-bg"><div class="stat-bar" id="bar-money"></div></div><span class="stat-value" id="val-money">1000</span></div>
            <div class="stat-row stat-esteem"><span class="stat-label">Самооценка</span><div class="stat-bar-bg"><div class="stat-bar" id="bar-esteem"></div></div><span class="stat-value" id="val-esteem">70</span></div>
        </div>
        <div class="panel-box" id="quests-box">
            <h2>Активные Квесты</h2>
            <div id="quests-list"></div>
        </div>
        <div class="panel-box" id="relations-box">
            <h2>Отношения</h2>
            <div id="relations-list"></div>
        </div>
    </div>
</div>

<!-- Interaction overlay -->
<div id="interaction-overlay" class="interaction-overlay">
    <div class="interaction-modal">
        <div class="modal-header">
            <span class="modal-avatar" id="modal-avatar"></span>
            <span class="modal-name" id="modal-name"></span>
            <button class="modal-close" id="modal-close">✕</button>
        </div>
        <div class="modal-body" id="modal-body"></div>
        <div class="modal-narrative" id="modal-narrative">Выбери действие…</div>
    </div>
</div>

<!-- Loading -->
<div id="loading">
    <div id="loading-text">Загрузка мира…</div>
    <div id="loading-dots">● ● ●</div>
</div>

<!-- Debug bar -->
<div id="debug-bar">
    <button class="dbg-btn" title="Yandex" onclick="window.open('https://ya.ru','_blank')">Я</button>
    <button class="dbg-btn" title="Toggle overlay" onclick="document.querySelector('.scene-element').style.display = document.querySelector('.scene-element').style.display === 'none' ? '' : 'none'">👁</button>
    <button class="dbg-btn" title="Settings" onclick="alert('Settings TBD')">⚙</button>
    <button class="dbg-btn" title="More" onclick="alert('Version 0.9')">⋮</button>
</div>

<script>
'use strict';

const BG_NATIVE_W = 320;
const BG_NATIVE_H = 240;

// ============================================================
//  Utilities
// ============================================================
const imageCache = {};

function preloadImage(url) {
    if (imageCache[url] !== undefined) return Promise.resolve(imageCache[url]);
    return new Promise(resolve => {
        const img = new Image();
        img.onload  = () => { imageCache[url] = true;  resolve(true);  };
        img.onerror = () => { imageCache[url] = false; resolve(false); };
        img.src = url;
    });
}

async function fetchJSON(url) {
    try { const r = await fetch(url); return r.ok ? await r.json() : null; }
    catch(_) { return null; }
}

function getTimeSlot(hour) {
    if (hour >= 6  && hour < 12) return 'morning';
    if (hour >= 12 && hour < 18) return 'day';
    if (hour >= 18 && hour < 23) return 'evening';
    return 'night';
}

const currentGameTime = { day: 1, hour: 8, minute: 0 };

// ============================================================
//  ScaleManager
// ============================================================
class ScaleManager {
    constructor(containerEl) {
        this.container = containerEl;
        this._scale = 1;
        this._listeners = [];
        this._recalc();
        const ro = new ResizeObserver(() => {
            this._recalc();
            this._listeners.forEach(fn => fn(this._scale));
        });
        ro.observe(containerEl);
    }
    get scale() { return this._scale; }
    onChange(fn) { this._listeners.push(fn); }
    _recalc() { this._scale = this.container.clientWidth / BG_NATIVE_W; }
}

// ============================================================
//  SpriteController — universal animation engine
//
//  renderMode = "sprite" (default):
//    CSS background-image + background-position animation.
//
//  renderMode = "overlay":
//    CSS backgroundColor + opacity + mix-blend-mode.
//    No background-image used — pure color overlay.
// ============================================================
class SpriteController {

    static async create(el, configUrl) {
        const config = await fetchJSON(configUrl);
        if (!config || !config.animations) return null;
        const v = config.configVersion || '0';
        if (!v.startsWith('1.')) {
            console.warn(`[SpriteController] Unsupported config version: ${v}`);
            return null;
        }
        return new SpriteController(el, config);
    }

    constructor(el, config) {
        this.el = el;
        this.config = config;
        this.baseUrl = '';
        this.scale = 1;
        this._displayScale = config.displayScale || 1.0;
        this._timer = null;
        this._currentAnim = null;
        this._currentAnimConfig = null;
        this._frame = 0;
        this._row = 0;
        this._columns = 0;
        this._totalRows = 1;
        this._frameW = 0;
        this._frameH = 0;
        this._fps = 1;
        this._rowMap = null;
        this._renderMode = 'sprite';
    }

    get currentAnimation() { return this._currentAnim; }
    get isPlaying() { return this._timer !== null; }
    get frameWidth() { return this._frameW; }
    get frameHeight() { return this._frameH; }
    get displayScale() { return this._displayScale; }
    get displayWidth() { return this._frameW * this._displayScale * this.scale; }
    get displayHeight() { return this._frameH * this._displayScale * this.scale; }

    setBaseUrl(url) { this.baseUrl = url.endsWith('/') ? url : url + '/'; }

    setScale(s) {
        this.scale = s;
        if (this._currentAnimConfig) this._applySize();
    }

    async play(name, opts) {
        const animCfg = this.config.animations[name];
        if (!animCfg) return false;
        this.stop();

        this._currentAnim = name;
        this._currentAnimConfig = animCfg;
        this._frame = 0;
        this._renderMode = animCfg.renderMode || 'sprite';

        this._frameW = animCfg.frameWidth  || this.config.spriteWidth  || 64;
        this._frameH = animCfg.frameHeight || this.config.spriteHeight || 64;

        if (animCfg.layout === 'grid') {
            this._columns = animCfg.columns;
            this._totalRows = animCfg.rows.length;
            this._buildRowMap(animCfg.rows);
            const defaultRow = animCfg.rows.find(r => r.rowIndex === (animCfg.defaultRow || 0))
                            || animCfg.rows[0];
            this._row = defaultRow.rowIndex;
            this._fps = defaultRow.fps;
        } else {
            this._columns = animCfg.columns;
            this._totalRows = 1;
            this._row = 0;
            this._fps = animCfg.fps;
            this._rowMap = null;
        }

        if (opts && opts.condition && this._rowMap) {
            this._applyCondition(opts.condition);
        }

        if (this._renderMode === 'overlay') {
            this._applyOverlay();
            this._applySize();
            return true;
        }

        // Sprite mode
        const atlasUrl = this.baseUrl + animCfg.file;
        const ok = await preloadImage(atlasUrl);
        if (!ok) return false;

        this.el.style.backgroundImage = `url('${atlasUrl}')`;
        this.el.style.backgroundColor = '';
        this.el.style.opacity = '';
        this.el.style.mixBlendMode = '';
        this._applySize();
        this._paint();

        if (this._columns > 1) {
            const interval = Math.round(1000 / this._fps);
            this._timer = setInterval(() => {
                this._frame = (this._frame + 1) % this._columns;
                this._paint();
            }, interval);
        }
        return true;
    }

    setCondition(conditionValue) {
        if (!this._rowMap) return;
        if (this._applyCondition(conditionValue)) {
            if (this._renderMode === 'overlay') {
                this._applyOverlay();
            } else {
                if (this._timer) {
                    clearInterval(this._timer);
                    const interval = Math.round(1000 / this._fps);
                    this._timer = setInterval(() => {
                        this._frame = (this._frame + 1) % this._columns;
                        this._paint();
                    }, interval);
                }
                this._paint();
            }
        }
    }

    stop() {
        if (this._timer) { clearInterval(this._timer); this._timer = null; }
    }

    _applySize() {
        const s = this.scale;
        const ds = this._displayScale;
        const dw = Math.round(this._frameW * ds * s);
        const dh = Math.round(this._frameH * ds * s);
        this.el.style.width  = dw + 'px';
        this.el.style.height = dh + 'px';
        if (this._renderMode === 'sprite') {
            this.el.style.backgroundSize =
                `${Math.round(this._columns * this._frameW * ds * s)}px ${Math.round(this._totalRows * this._frameH * ds * s)}px`;
        }
    }

    _paint() {
        if (this._renderMode !== 'sprite') return;
        const s = this.scale;
        const ds = this._displayScale;
        this.el.style.backgroundPosition =
            `${-Math.round(this._frame * this._frameW * ds * s)}px ${-Math.round(this._row * this._frameH * ds * s)}px`;
    }

    _applyOverlay() {
        const rowDef = this._findCurrentRowDef();
        if (!rowDef) return;
        this.el.style.backgroundImage = 'none';
        this.el.style.backgroundColor = rowDef.tint || '#000000';
        this.el.style.opacity = rowDef.opacity != null ? rowDef.opacity : 0.1;
        this.el.style.mixBlendMode = 'multiply';
        this.el.style.transition = 'background-color 1.5s ease, opacity 1.5s ease';
    }

    _findCurrentRowDef() {
        if (!this._currentAnimConfig || !this._currentAnimConfig.rows) return null;
        return this._currentAnimConfig.rows.find(r => r.rowIndex === this._row);
    }

    _buildRowMap(rows) {
        this._rowMap = {};
        for (const r of rows) {
            if (r.condition) this._rowMap[r.condition.value] = r;
        }
    }

    _applyCondition(value) {
        const rowDef = this._rowMap[value];
        if (!rowDef || rowDef.rowIndex === this._row) return false;
        this._row = rowDef.rowIndex;
        this._fps = rowDef.fps;
        this._frame = 0;
        return true;
    }
}

// ============================================================
//  SceneElement — animated or static element on the scene
//  Uses SpriteController for BOTH sprite and overlay modes.
//  Auto-discovers ALL animations from location sprite-atlas.json.
// ============================================================
class SceneElement {

    constructor(def, scaleManager) {
        this.def = def;
        this.scaleManager = scaleManager;
        this.sprite = null;
        this.el = null;
        this._ready = this._initAsync();
    }

    async _initAsync() {
        const container = this.scaleManager.container;
        this.el = document.createElement('div');
        this.el.className = 'scene-element';
        this.el.style.zIndex = this.def.zIndex || 2;
        container.appendChild(this.el);

        if (this.def.atlasConfig) {
            this.sprite = await SpriteController.create(this.el, this.def.atlasConfig);
            if (this.sprite) {
                this.sprite.setBaseUrl(this.def.assetsBase + '/');
                this.sprite.setScale(this.scaleManager.scale);
                const slot = getTimeSlot(currentGameTime.hour);
                const animName = this.def.animation || 'idle';
                await this.sprite.play(animName, { condition: slot });
                this._applyPosition();
            }
        }

        if (!this.sprite && this.def.staticImage) {
            const ok = await preloadImage(this.def.staticImage);
            if (ok) {
                const s = this.scaleManager.scale;
                const w = (this.def.nativeW || BG_NATIVE_W);
                const h = (this.def.nativeH || BG_NATIVE_H);
                this.el.style.backgroundImage = `url('${this.def.staticImage}')`;
                this.el.style.width  = Math.round(w * s) + 'px';
                this.el.style.height = Math.round(h * s) + 'px';
                this.el.style.backgroundSize = '100% 100%';
                this._applyPosition();
            }
        }

        this.scaleManager.onChange(scale => this.onScaleChange(scale));
    }

    _applyPosition() {
        const s = this.scaleManager.scale;
        if (this.def.nativeX != null) this.el.style.left = Math.round(this.def.nativeX * s) + 'px';
        if (this.def.nativeY != null) this.el.style.top = Math.round(this.def.nativeY * s) + 'px';
    }

    onScaleChange(scale) {
        if (this.sprite) {
            this.sprite.setScale(scale);
        } else if (this.def.staticImage) {
            const w = (this.def.nativeW || BG_NATIVE_W);
            const h = (this.def.nativeH || BG_NATIVE_H);
            this.el.style.width  = Math.round(w * scale) + 'px';
            this.el.style.height = Math.round(h * scale) + 'px';
        }
        this._applyPosition();
    }

    onTimeSlotChange(slot) {
        if (this.sprite) this.sprite.setCondition(slot);
    }
}

// ============================================================
//  SceneActor — character on the scene
//  Sizes driven entirely by SpriteController (displayScale in config).
// ============================================================
class SceneActor {

    constructor(layout, scaleManager) {
        this.layout = layout;
        this.scaleManager = scaleManager;
        this.el = document.getElementById(layout.el);
        this.labelEl  = document.getElementById(layout.labelEl);
        this.activityEl = document.getElementById(layout.activityEl);
        this.sprite = null;
        this.state = 'idle';
        this.isStatic = false;
        this.posX = layout.startX || (BG_NATIVE_W * layout.startPct / 100);
        this.targetX = this.posX;
        this.moveRAF = null;
        this._initAsync();
        scaleManager.onChange(() => this._onScaleChange());
    }

    async _initAsync() {
        const L = this.layout;
        const configUrl = `${L.assetsBase}/sprite-atlas.json?v=latest`;
        this.sprite = await SpriteController.create(this.el, configUrl);

        if (this.sprite) {
            this.sprite.setBaseUrl(L.assetsBase + '/');
            this.sprite.setScale(this.scaleManager.scale);
            const slot = getTimeSlot(currentGameTime.hour);
            const started = await this.sprite.play('idle', { condition: slot });
            if (started) {
                this.el.classList.remove('sprite-placeholder');
                this.el.innerHTML = '';
                this.el.style.backgroundColor = '';
                this.state = 'idle';
            } else {
                this._tryStaticFallback() || this._applyPlaceholder();
            }
        } else {
            this._tryStaticFallback() || this._applyPlaceholder();
        }
        this._updatePosition();
        this._scheduleNextWalk();
        this._rotateActivity();
    }

    async _tryStaticFallback() {
        const L = this.layout;
        const ok = await preloadImage(L.staticFallback);
        if (!ok) return false;
        const s = this.scaleManager.scale;
        this.el.style.backgroundImage = `url('${L.staticFallback}')`;
        this.el.style.width  = Math.round(L.nativeW * s) + 'px';
        this.el.style.height = Math.round(L.nativeH * s) + 'px';
        this.el.style.backgroundSize = '100% 100%';
        this.isStatic = true;
        this.state = 'idle';
        return true;
    }

    _applyPlaceholder() {
        const L = this.layout;
        const s = this.scaleManager.scale;
        const dw = Math.round(L.nativeW * s);
        const dh = Math.round(L.nativeH * s);
        this.el.style.backgroundImage = 'none';
        this.el.style.width  = dw + 'px';
        this.el.style.height = dh + 'px';
        this.el.style.backgroundColor = L.placeholderColor;
        this.el.classList.add('sprite-placeholder');
        this.el.innerHTML = `<span style="font-size:${dh/3}px">${L.placeholderEmoji}</span>`;
        this.isStatic = true;
    }

    get displayW() {
        return this.sprite ? this.sprite.displayWidth : this.layout.nativeW * this.scaleManager.scale;
    }
    get displayH() {
        return this.sprite ? this.sprite.displayHeight : this.layout.nativeH * this.scaleManager.scale;
    }

    async switchToIdle() {
        if (!this.sprite) return;
        this.sprite.stop();
        const slot = getTimeSlot(currentGameTime.hour);
        await this.sprite.play('idle', { condition: slot });
        this.state = 'idle';
    }

    async switchToWalk() {
        if (!this.sprite) return false;
        this.sprite.stop();
        const started = await this.sprite.play('walk');
        if (started) { this.state = 'walking'; return true; }
        return false;
    }

    onTimeSlotChange(newSlot) {
        if (this.sprite && this.state === 'idle') this.sprite.setCondition(newSlot);
    }

    _onScaleChange() {
        if (this.sprite) {
            this.sprite.setScale(this.scaleManager.scale);
        } else if (this.isStatic) {
            const s = this.scaleManager.scale;
            const L = this.layout;
            this.el.style.width  = Math.round(L.nativeW * s) + 'px';
            this.el.style.height = Math.round(L.nativeH * s) + 'px';
        }
        this._updatePosition();
    }

    _scheduleNextWalk() {
        const L = this.layout;
        const delay = (L.idleMinSec + Math.random() * (L.idleMaxSec - L.idleMinSec)) * 1000;
        setTimeout(() => this._startWalk(), delay);
    }

    async _startWalk() {
        if (!this.sprite || !this.sprite.config.animations.walk) {
            this._scheduleNextWalk(); return;
        }
        const L = this.layout;
        // Use sprite's native frame width (with displayScale) for collision
        const nativeW = this.sprite.frameWidth * this.sprite.displayScale || L.nativeW;
        const minNX = BG_NATIVE_W * L.minX / 100;
        const maxNX = BG_NATIVE_W * L.maxX / 100 - nativeW;
        this.targetX = minNX + Math.random() * (maxNX - minNX);
        if (Math.abs(this.targetX - this.posX) < 5) { this._scheduleNextWalk(); return; }
        this.el.style.transform = this.targetX < this.posX ? 'scaleX(-1)' : 'scaleX(1)';
        const ok = await this.switchToWalk();
        if (ok) this._move(); else this._scheduleNextWalk();
    }

    _move() {
        const speed = (this.layout.speed || 1.5) / 60;
        const step = () => {
            const dx = this.targetX - this.posX;
            if (Math.abs(dx) < speed) {
                this.posX = this.targetX;
                this._updatePosition();
                this.el.style.transform = 'scaleX(1)';
                this.switchToIdle();
                this._scheduleNextWalk();
                return;
            }
            this.posX += dx > 0 ? speed : -speed;
            this._updatePosition();
            this.moveRAF = requestAnimationFrame(step);
        };
        this.moveRAF = requestAnimationFrame(step);
    }

    _updatePosition() {
        const s = this.scaleManager.scale;
        const L = this.layout;
        const screenX = Math.round(this.posX * s);
        this.el.style.left = screenX + 'px';
        this.el.style.right = 'auto';
        this.el.style.bottom = L.bottomPct + '%';
        const dw = this.displayW;
        const dh = this.displayH;
        if (this.labelEl) {
            this.labelEl.style.left = (screenX + dw / 2 - 30) + 'px';
            this.labelEl.style.right = 'auto';
            this.labelEl.style.bottom = `calc(${L.bottomPct}% - 14px)`;
        }
        if (this.activityEl) {
            this.activityEl.style.left = (screenX + dw / 2 - 9) + 'px';
            this.activityEl.style.right = 'auto';
            this.activityEl.style.bottom = `calc(${L.bottomPct}% + ${dh}px + 4px)`;
        }
    }

    _rotateActivity() {
        if (!this.activityEl || !this.layout.activities) return;
        const arr = this.layout.activities;
        this.activityEl.textContent = arr[Math.floor(Math.random() * arr.length)];
        setTimeout(() => this._rotateActivity(), (3 + Math.random() * 4) * 1000);
    }
}

// ============================================================
//  InteractionModal
// ============================================================
class InteractionModal {
    constructor() {
        this.overlay = document.getElementById('interaction-overlay');
        this.avatarEl = document.getElementById('modal-avatar');
        this.nameEl = document.getElementById('modal-name');
        this.bodyEl = document.getElementById('modal-body');
        this.narrativeEl = document.getElementById('modal-narrative');
        this.currentTarget = null;

        document.getElementById('modal-close').addEventListener('click', () => this.hide());
        this.overlay.addEventListener('click', e => { if (e.target === this.overlay) this.hide(); });
    }

    show(targetId) {
        const npc = NPC_ACTIONS[targetId];
        if (!npc) return;
        this.currentTarget = targetId;
        this.avatarEl.textContent = npc.avatar;
        this.nameEl.textContent = npc.name;
        this.narrativeEl.textContent = 'Выбери действие…';

        let html = `<p class="modal-desc">${npc.desc}</p>`;
        for (const a of npc.actions) {
            const hourLeft = 24 - currentGameTime.hour;
            const disabled = hourLeft < a.costH ? 'disabled' : '';
            html += `<button class="action-btn" data-action="${a.code}" data-target="${targetId}" ${disabled}>`
                  + `${a.label}<span class="action-cost">${a.cost}</span></button>`;
        }
        this.bodyEl.innerHTML = html;

        this.bodyEl.querySelectorAll('.action-btn').forEach(btn => {
            btn.addEventListener('click', () => this._onAction(btn.dataset.target, btn.dataset.action));
        });

        this.overlay.classList.add('visible');
    }

    hide() { this.overlay.classList.remove('visible'); this.currentTarget = null; }

    async _onAction(target, action) {
        this.bodyEl.querySelectorAll('.action-btn').forEach(b => b.disabled = true);
        this.narrativeEl.textContent = '…';
        try {
            const res = await fetch(`/api/demo/action/${target}/${action}`, { method: 'POST' });
            const data = await res.json();
            if (data.narrative) {
                let text = data.narrative;
                if (data.statChanges) {
                    for (const [stat, delta] of Object.entries(data.statChanges)) {
                        const cls = delta > 0 ? 'positive' : 'negative';
                        const sign = delta > 0 ? '+' : '';
                        text += ` <span class="stat-change ${cls}">${stat} ${sign}${delta}</span>`;
                    }
                }
                this.narrativeEl.innerHTML = text;
            }
            if (data.newStatus) syncFromServerState(data.newStatus);
        } catch(e) {
            this.narrativeEl.textContent = 'Ошибка связи с сервером…';
        }
    }
}

// ============================================================
//  State sync
// ============================================================
function syncFromServerState(s) {
    if (s.gameTime) {
        currentGameTime.day = s.gameTime.day;
        currentGameTime.hour = s.gameTime.hour;
        currentGameTime.minute = s.gameTime.minute || 0;
        const pad = n => String(n).padStart(2,'0');
        document.getElementById('game-time').textContent =
            `День ${s.gameTime.day} | ${pad(s.gameTime.hour)}:${pad(s.gameTime.minute||0)}`;

        const slot = getTimeSlot(s.gameTime.hour);
        actors.forEach(a => a.onTimeSlotChange(slot));
        sceneElements.forEach(e => e.onTimeSlotChange(slot));
    }
    if (s.stats) {
        for (const [key, val] of Object.entries(s.stats)) {
            const bar = document.getElementById('bar-' + key);
            const valEl = document.getElementById('val-' + key);
            if (bar) bar.style.width = Math.min(100, Math.max(0, val)) + '%';
            if (valEl) valEl.textContent = Math.round(val);
        }
    }
    if (s.quests) renderQuests(s.quests);
    if (s.relationships) renderRelationships(s.relationships);
}

function renderRelationships(rels) {
    const container = document.getElementById('relations-list');
    container.innerHTML = '';
    for (const r of rels) {
        const filled = Math.round(r.level / 10);
        const empty = 10 - filled;
        const hearts = '♥'.repeat(filled) + '♡'.repeat(empty);
        const icon = r.icon ? ` ${r.icon}` : '';
        container.innerHTML += `<div class="rel-row"><span class="rel-label">${r.name}${icon}</span><span class="rel-hearts">${hearts}</span></div>`;
    }
}

function renderQuests(quests) {
    const container = document.getElementById('quests-list');
    container.innerHTML = '';
    for (const q of quests) {
        let html = `<div class="quest-item">`;
        html += `<span class="quest-type-badge quest-${q.type}">${formatQuestType(q.type)}</span>`;
        html += `<div class="quest-title">${q.title}</div>`;
        if (q.steps) {
            for (const step of q.steps) {
                const done = step.current >= step.target ? 'done' : '';
                html += `<div class="quest-step ${done}">${step.description} (${step.current}/${step.target})</div>`;
            }
        }
        html += `</div>`;
        const div = document.createElement('div');
        div.innerHTML = html;
        if (q.status === 'COMPLETED') div.classList.add('quest-complete-flash');
        container.appendChild(div);
    }
}

function formatQuestType(type) {
    return { 'SELF_CARE_ARC': 'Забота о себе', 'FAMILY_HARMONY': 'Семья', 'CAREER_GROWTH': 'Карьера' }[type] || type;
}

// ============================================================
//  Init
// ============================================================
const actors = [];
const sceneElements = [];
let modal;
let scaleManager;

async function init() {
    const container = document.getElementById('room-container');

    // Background
    const bgEl = document.getElementById('room-bg');
    bgEl.style.backgroundImage = `url('${LOC_BASE}/home_room.png')`;

    // Scale manager
    scaleManager = new ScaleManager(container);

    // Auto-discover location animations from sprite-atlas.json
    const locConfig = await fetchJSON(LOC_ATLAS_CONFIG_URL);
    if (locConfig && locConfig.animations) {
        for (const [animName, animDef] of Object.entries(locConfig.animations)) {
            const hints = LOC_ANIM_HINTS[animName] || { nativeX: 0, nativeY: 0, zIndex: 2 };
            const def = {
                atlasConfig: LOC_ATLAS_CONFIG_URL,
                assetsBase: LOC_ASSETS_BASE,
                animation: animName,
                nativeX: hints.nativeX || 0,
                nativeY: hints.nativeY || 0,
                nativeW: hints.nativeW || animDef.frameWidth || BG_NATIVE_W,
                nativeH: hints.nativeH || animDef.frameHeight || BG_NATIVE_H,
                zIndex: hints.zIndex || 2
            };
            sceneElements.push(new SceneElement(def, scaleManager));
        }
    }

    // Interaction modal
    modal = new InteractionModal();

    // Character actors
    for (const [id, layout] of Object.entries(ACTOR_LAYOUTS)) {
        actors.push(new SceneActor(layout, scaleManager));
    }

    ['alexander', 'sam', 'tanya'].forEach(id => {
        document.getElementById(id).addEventListener('click', e => {
            e.stopPropagation();
            modal.show(id);
        });
    });

    const status = await fetchJSON('/api/demo/status');
    if (status) syncFromServerState(status);

    const loading = document.getElementById('loading');
    loading.classList.add('hidden');
    setTimeout(() => loading.remove(), 500);

    setInterval(async () => {
        const s = await fetchJSON('/api/demo/status');
        if (s) syncFromServerState(s);
    }, 10000);
}

window.addEventListener('DOMContentLoaded', init);
</script>
