<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Life of T — Demo</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 100%; height: 100%; background: #0d0d14; color: #e0d8c8; font-family: 'Courier New', Courier, monospace; }

#app { display: grid; grid-template-columns: 1fr 300px; grid-template-rows: auto 1fr; height: 100vh; gap: 0; }
#header { grid-column: 1/-1; background: #1a1a2e; border-bottom: 2px solid #4a3e6a; padding: 10px 20px; display: flex; align-items: center; gap: 16px; }
#header h1 { font-size: 1.4rem; color: #c8a0ff; letter-spacing: 2px; text-transform: uppercase; }
#header .subtitle { color: #7a6890; font-size: 0.75rem; }
#game-time { margin-left: auto; color: #8be0b4; font-size: 0.85rem; }

#room-container {
    position: relative;
    background: #1c2a3a;
    overflow: hidden;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
}

#room-bg {
    position: absolute; inset: 0;
    background-image: url('/assets/generated/locations/home_room/home_room.png');
    background-size: 100% 100%;
    background-repeat: no-repeat;
    image-rendering: pixelated;
}

#room-floor {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 40%;
    background:
        repeating-linear-gradient(90deg, rgba(255,255,255,0.03) 0 1px, transparent 1px 32px),
        repeating-linear-gradient(0deg, rgba(255,255,255,0.03) 0 1px, transparent 1px 32px);
}

.sprite {
    position: absolute;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
    background-repeat: no-repeat;
    transition: none;
}

.sprite.clickable { cursor: pointer; }
.sprite.clickable:hover { filter: brightness(1.3) drop-shadow(0 0 6px rgba(200,160,255,0.5)); }
.sprite.clickable:active { filter: brightness(1.5); transform: scale(0.97); }

#bed {
    bottom: 28%; right: 8%;
    width: 192px; height: 192px;
    background-image: url('/assets/generated/locations/home_room/bed.png');
    background-size: 100% 100%;
}
#desk {
    bottom: 22%; left: 10%;
    width: 192px; height: 192px;
    background-image: url('/assets/generated/locations/home_room/desk.png');
    background-size: 100% 100%;
}

/* Character sprites — initial sizes, overridden by SpriteController */
#sam {
    bottom: 24%; right: 22%;
    width: 96px; height: 80px;
}
#tanya {
    bottom: 22%; left: 35%;
    width: 128px; height: 128px;
}
#alexander {
    bottom: 22%; right: 30%;
    width: 128px; height: 128px;
}

.activity-icon {
    position: absolute;
    font-size: 18px;
    pointer-events: none;
    text-shadow: 1px 1px 2px rgba(0,0,0,0.7);
    transition: opacity 0.3s;
}

#side-panel {
    background: #12121e;
    border-left: 2px solid #2a2a4a;
    padding: 12px;
    overflow-y: auto;
    display: flex; flex-direction: column; gap: 10px;
}
.panel-box {
    background: #1a1a30;
    border: 1px solid #3a3a5a;
    border-radius: 2px;
    padding: 10px;
}
.panel-box h2 {
    font-size: 0.7rem; text-transform: uppercase;
    letter-spacing: 1px; color: #8070a0;
    margin-bottom: 8px;
    border-bottom: 1px solid #2a2a4a;
    padding-bottom: 4px;
}
.stat-row { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; }
.stat-label { font-size: 0.65rem; color: #a098b8; width: 70px; flex-shrink: 0; }
.stat-bar-bg { flex: 1; height: 6px; background: #2a2a3a; position: relative; }
.stat-bar { height: 6px; transition: width 0.5s ease; }
.stat-energy  .stat-bar { background: #80e880; }
.stat-health  .stat-bar { background: #e84040; }
.stat-stress  .stat-bar { background: #e8a040; }
.stat-mood    .stat-bar { background: #40a8e8; }
.stat-money   .stat-bar { background: #e8e040; }
.stat-esteem  .stat-bar { background: #c840e8; }
.stat-value { font-size: 0.6rem; color: #706890; width: 24px; text-align: right; }

.quest-item { margin-bottom: 8px; }
.quest-title { font-size: 0.7rem; color: #d0c0ff; margin-bottom: 3px; }
.quest-type-badge { display: inline-block; font-size: 0.55rem; padding: 1px 4px; border-radius: 1px; margin-bottom: 4px; }
.quest-SELF_CARE_ARC  { background: #2a4a2a; color: #80e880; }
.quest-FAMILY_HARMONY { background: #4a2a2a; color: #e88080; }
.quest-CAREER_GROWTH  { background: #2a3a4a; color: #80c0e8; }
.quest-progress-bg { width: 100%; height: 4px; background: #2a2a3a; margin-bottom: 4px; }
.quest-progress-fill { height: 4px; background: #8060c0; transition: width 0.5s ease; }
.quest-step { font-size: 0.6rem; color: #706890; padding-left: 6px; margin-bottom: 1px; }
.quest-step.done { color: #50e890; }
.quest-step::before { content: '▸ '; }
.quest-step.done::before { content: '✓ '; }

.rel-row { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; }
.rel-label { font-size: 0.65rem; color: #a098b8; width: 70px; flex-shrink: 0; }
.rel-hearts { font-size: 0.7rem; color: #e84060; transition: all 0.3s; }

#status-bar {
    position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%);
    background: rgba(0,0,0,0.6); border: 1px solid #3a3a5a;
    padding: 4px 12px; font-size: 0.65rem; color: #8080a0; pointer-events: none;
    transition: all 0.3s;
}
#loading {
    position: fixed; inset: 0; background: #0d0d14;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    z-index: 100; transition: opacity 0.4s;
}
#loading.hidden { opacity: 0; pointer-events: none; }
#loading-text { color: #c8a0ff; font-size: 1rem; margin-bottom: 12px; }
#loading-dots { color: #7a6890; font-size: 0.8rem; }

#room-container::after {
    content: ''; position: absolute; inset: 0;
    background: repeating-linear-gradient(0deg, rgba(0,0,0,0.05) 0px, rgba(0,0,0,0.05) 1px, transparent 1px, transparent 2px);
    pointer-events: none; z-index: 5;
}

.sprite-label {
    position: absolute; font-size: 9px; color: #a098b8;
    text-align: center; pointer-events: none;
    text-shadow: 1px 1px 0 #000; white-space: nowrap;
}

.sprite-placeholder {
    border: 2px dashed rgba(200,160,255,0.3);
    display: flex; align-items: center; justify-content: center;
    font-size: 24px;
}

/* ======================== Interaction Modal ======================== */
.interaction-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.5);
    z-index: 50; display: flex; align-items: center; justify-content: center;
    opacity: 0; transition: opacity 0.25s;
    pointer-events: none;
}
.interaction-overlay.visible { opacity: 1; pointer-events: all; }

.interaction-modal {
    background: #1a1a30; border: 2px solid #6040a0;
    border-radius: 4px; padding: 0; width: 360px; max-width: 90vw;
    box-shadow: 0 8px 32px rgba(0,0,0,0.6);
    transform: translateY(20px); transition: transform 0.25s;
}
.interaction-overlay.visible .interaction-modal { transform: translateY(0); }

.modal-header {
    display: flex; align-items: center; gap: 10px;
    padding: 12px 16px; border-bottom: 1px solid #3a3a5a;
    background: #22224a;
}
.modal-avatar { font-size: 28px; }
.modal-name { font-size: 0.9rem; color: #c8a0ff; font-weight: bold; }
.modal-close {
    margin-left: auto; background: none; border: none;
    color: #706890; font-size: 1.2rem; cursor: pointer;
    padding: 4px 8px;
}
.modal-close:hover { color: #c8a0ff; }

.modal-body { padding: 16px; }
.modal-desc { font-size: 0.75rem; color: #a098b8; margin-bottom: 12px; line-height: 1.4; }

.action-btn {
    display: block; width: 100%; padding: 10px 14px;
    margin-bottom: 6px; background: #2a2a50; border: 1px solid #4a3e6a;
    border-radius: 3px; color: #d0c0ff; font-size: 0.8rem;
    font-family: inherit; cursor: pointer; text-align: left;
    transition: all 0.15s;
}
.action-btn:hover { background: #3a3a6a; border-color: #8060c0; transform: translateX(4px); }
.action-btn:active { background: #4a4a7a; }
.action-btn .action-cost {
    float: right; font-size: 0.65rem; color: #706890;
}
.action-btn:disabled {
    opacity: 0.4; cursor: not-allowed;
    transform: none !important; background: #1a1a30 !important;
}

.modal-narrative {
    padding: 16px; font-size: 0.75rem; color: #c8c0d8;
    line-height: 1.5; min-height: 60px;
    border-top: 1px solid #3a3a5a;
    background: #161630;
}
.modal-narrative .stat-change {
    display: inline-block; font-size: 0.65rem; padding: 1px 5px;
    border-radius: 2px; margin: 2px 2px;
}
.modal-narrative .stat-pos { background: #1a4a1a; color: #80e880; }
.modal-narrative .stat-neg { background: #4a1a1a; color: #e88080; }

.stat-floater {
    position: absolute; pointer-events: none;
    font-size: 14px; font-weight: bold;
    text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
    animation: floatUp 1.5s ease-out forwards;
    z-index: 40;
}
.stat-floater.positive { color: #80e880; }
.stat-floater.negative { color: #e88080; }
@keyframes floatUp {
    0%   { opacity: 1; transform: translateY(0); }
    100% { opacity: 0; transform: translateY(-40px); }
}

.heart-particle {
    position: absolute; pointer-events: none; font-size: 16px; z-index: 40;
    animation: heartBurst 1.2s ease-out forwards;
}
@keyframes heartBurst {
    0%   { opacity: 1; transform: translate(0,0) scale(0.5); }
    50%  { opacity: 1; transform: translate(var(--dx), var(--dy)) scale(1.2); }
    100% { opacity: 0; transform: translate(var(--dx), calc(var(--dy) - 20px)) scale(0.3); }
}

@keyframes questFlash {
    0%   { background: #3a6a3a; }
    100% { background: #1a1a30; }
}
.quest-complete-flash { animation: questFlash 1s ease; }
</style>
</head>
<body>

<script>
'use strict';

// ============================================================
//  Utilities
// ============================================================
const imageCache = {};

function preloadImage(url) {
    if (imageCache[url] !== undefined) return Promise.resolve(imageCache[url]);
    return new Promise(resolve => {
        const img = new Image();
        img.onload  = () => { imageCache[url] = true;  resolve(true);  };
        img.onerror = () => { imageCache[url] = false; resolve(false); };
        img.src = url;
    });
}

async function fetchJSON(url) {
    try { const r = await fetch(url); return r.ok ? await r.json() : null; }
    catch(_) { return null; }
}

function getTimeSlot(hour) {
    if (hour >= 6  && hour < 12) return 'morning';
    if (hour >= 12 && hour < 18) return 'day';
    if (hour >= 18 && hour < 23) return 'evening';
    return 'night';
}

// ============================================================
//  SpriteController — universal animation engine
//
//  Reads sprite-atlas.json config (v1.*), plays any named
//  animation by driving CSS background-position on 2 axes.
//
//  v1.1: reads frameWidth/frameHeight per animation entry.
//        Resizes the DOM element to match current animation.
// ============================================================
class SpriteController {

    static async create(el, configUrl) {
        const config = await fetchJSON(configUrl);
        if (!config || !config.animations) return null;

        const v = config.configVersion || '0';
        if (!v.startsWith('1.')) {
            console.warn(`[SpriteController] Unsupported config version: ${v}`);
            return null;
        }

        return new SpriteController(el, config);
    }

    constructor(el, config) {
        this.el = el;
        this.config = config;
        this.baseUrl = '';

        this._timer = null;
        this._currentAnim = null;
        this._currentAnimConfig = null;
        this._frame = 0;
        this._row = 0;
        this._columns = 0;
        this._totalRows = 1;
        this._frameW = 0;
        this._frameH = 0;
        this._rowMap = null;
    }

    get currentAnimation() { return this._currentAnim; }
    get isPlaying() { return this._timer !== null; }
    get frameWidth() { return this._frameW; }
    get frameHeight() { return this._frameH; }

    setBaseUrl(url) {
        this.baseUrl = url.endsWith('/') ? url : url + '/';
    }

    /**
     * Start playing a named animation.
     * Reads frameWidth/frameHeight from the animation entry (v1.1),
     * falls back to global spriteWidth/spriteHeight (v1.0 compat).
     */
    async play(name, opts) {
        const animCfg = this.config.animations[name];
        if (!animCfg) {
            console.warn(`[SpriteController] Animation "${name}" not found`);
            return false;
        }

        this.stop();

        this._currentAnim = name;
        this._currentAnimConfig = animCfg;
        this._frame = 0;

        // Frame dimensions: per-animation (v1.1) > global (v1.0 compat)
        this._frameW = animCfg.frameWidth  || this.config.spriteWidth  || 64;
        this._frameH = animCfg.frameHeight || this.config.spriteHeight || 64;

        if (animCfg.layout === 'grid') {
            this._columns = animCfg.columns;
            this._totalRows = animCfg.rows.length;
            this._buildRowMap(animCfg.rows);
            const defaultRow = animCfg.rows.find(r => r.rowIndex === (animCfg.defaultRow || 0))
                            || animCfg.rows[0];
            this._row = defaultRow.rowIndex;
            this._fps = defaultRow.fps;
        } else {
            this._columns = animCfg.columns;
            this._totalRows = 1;
            this._row = 0;
            this._fps = animCfg.fps;
            this._rowMap = null;
        }

        if (opts && opts.condition && this._rowMap) {
            this._applyCondition(opts.condition);
        }

        const atlasUrl = this.baseUrl + animCfg.file;
        const ok = await preloadImage(atlasUrl);
        if (!ok) return false;

        // Resize DOM element to exactly one frame
        this.el.style.width  = this._frameW + 'px';
        this.el.style.height = this._frameH + 'px';

        // Background covers the full atlas grid
        this.el.style.backgroundImage = `url('${atlasUrl}')`;
        this.el.style.backgroundSize =
            `${this._columns * this._frameW}px ${this._totalRows * this._frameH}px`;
        this._paint();

        if (this._columns > 1) {
            const interval = Math.round(1000 / this._fps);
            this._timer = setInterval(() => {
                this._frame = (this._frame + 1) % this._columns;
                this._paint();
            }, interval);
        }

        return true;
    }

    setCondition(conditionValue) {
        if (!this._rowMap) return;
        if (this._applyCondition(conditionValue)) {
            if (this._timer) {
                clearInterval(this._timer);
                const interval = Math.round(1000 / this._fps);
                this._timer = setInterval(() => {
                    this._frame = (this._frame + 1) % this._columns;
                    this._paint();
                }, interval);
            }
            this._paint();
        }
    }

    stop() {
        if (this._timer) {
            clearInterval(this._timer);
            this._timer = null;
        }
    }

    reapply() {
        if (!this._currentAnimConfig) return;
        const atlasUrl = this.baseUrl + this._currentAnimConfig.file;
        this.el.style.backgroundImage = `url('${atlasUrl}')`;
        this.el.style.width  = this._frameW + 'px';
        this.el.style.height = this._frameH + 'px';
        this.el.style.backgroundSize =
            `${this._columns * this._frameW}px ${this._totalRows * this._frameH}px`;
        this._paint();
    }

    _paint() {
        this.el.style.backgroundPosition =
            `${-(this._frame * this._frameW)}px ${-(this._row * this._frameH)}px`;
    }

    _buildRowMap(rows) {
        this._rowMap = {};
        for (const r of rows) {
            if (r.condition) this._rowMap[r.condition.value] = r;
        }
    }

    _applyCondition(value) {
        const rowDef = this._rowMap[value];
        if (!rowDef || rowDef.rowIndex === this._row) return false;
        this._row = rowDef.rowIndex;
        this._fps = rowDef.fps;
        this._frame = 0;
        return true;
    }
}

// ============================================================
//  SceneActor — character on the scene
// ============================================================
class SceneActor {

    constructor(layout) {
        this.layout = layout;
        this.el = document.getElementById(layout.el);
        this.labelEl  = document.getElementById(layout.labelEl);
        this.activityEl = document.getElementById(layout.activityEl);

        this.sprite = null;
        this.state = 'idle';
        this.isStatic = false;

        const rect = this.el.getBoundingClientRect();
        const container = this.el.parentElement.getBoundingClientRect();
        this.posX = rect.left - container.left;
        this.targetX = this.posX;
        this.moveRAF = null;

        this._initAsync();
    }

    async _initAsync() {
        const L = this.layout;
        const configUrl = `${L.assetsBase}/sprite-atlas.json?v=latest`;
        this.sprite = await SpriteController.create(this.el, configUrl);

        if (this.sprite) {
            this.sprite.setBaseUrl(L.assetsBase + '/');
            const slot = getTimeSlot(currentGameTime.hour);
            const started = await this.sprite.play('idle', { condition: slot });
            if (started) {
                this.el.classList.remove('sprite-placeholder');
                this.el.innerHTML = '';
                this.el.style.backgroundColor = '';
                this.state = 'idle';
            } else {
                this._tryStaticFallback() || this._applyPlaceholder();
            }
        } else {
            this._tryStaticFallback() || this._applyPlaceholder();
        }

        this._scheduleNextWalk();
        this._rotateActivity();
    }

    async _tryStaticFallback() {
        const L = this.layout;
        const ok = await preloadImage(L.staticFallback);
        if (!ok) return false;
        this.el.style.backgroundImage = `url('${L.staticFallback}')`;
        this.el.style.width  = L.fallbackW + 'px';
        this.el.style.height = L.fallbackH + 'px';
        this.el.style.backgroundSize = `${L.fallbackW}px ${L.fallbackH}px`;
        this.el.style.backgroundPosition = '0 0';
        this.isStatic = true;
        this.state = 'idle';
        return true;
    }

    _applyPlaceholder() {
        const L = this.layout;
        this.el.style.backgroundImage = 'none';
        this.el.style.width  = L.fallbackW + 'px';
        this.el.style.height = L.fallbackH + 'px';
        this.el.style.backgroundColor = L.placeholderColor;
        this.el.classList.add('sprite-placeholder');
        this.el.innerHTML = `<span style="font-size:${L.fallbackH/3}px">${L.placeholderEmoji}</span>`;
        this.isStatic = true;
        this.state = 'idle';
    }

    async switchToIdle() {
        if (!this.sprite) return;
        this.sprite.stop();
        const slot = getTimeSlot(currentGameTime.hour);
        await this.sprite.play('idle', { condition: slot });
        this.state = 'idle';
    }

    async switchToWalk() {
        if (!this.sprite) return false;
        this.sprite.stop();
        const started = await this.sprite.play('walk');
        if (started) { this.state = 'walking'; return true; }
        return false;
    }

    onTimeSlotChange(newSlot) {
        if (this.sprite && this.state === 'idle') {
            this.sprite.setCondition(newSlot);
        }
    }

    /** Current display height (from sprite or fallback) */
    get displayHeight() {
        return this.sprite && this.sprite.frameHeight
            ? this.sprite.frameHeight
            : this.layout.fallbackH;
    }

    _scheduleNextWalk() {
        const L = this.layout;
        const delay = (L.idleMinSec + Math.random() * (L.idleMaxSec - L.idleMinSec)) * 1000;
        setTimeout(() => this._startWalk(), delay);
    }

    async _startWalk() {
        if (!this.sprite || !this.sprite.config.animations.walk) {
            this._scheduleNextWalk();
            return;
        }
        const container = this.el.parentElement;
        if (!container) return;
        const cw = container.clientWidth;
        const L = this.layout;
        const sprW = this.sprite.frameWidth || L.fallbackW;
        const minPx = cw * L.minX / 100;
        const maxPx = cw * L.maxX / 100 - sprW;
        this.targetX = minPx + Math.random() * (maxPx - minPx);
        if (Math.abs(this.targetX - this.posX) < 20) { this._scheduleNextWalk(); return; }

        this.el.style.transform = this.targetX < this.posX ? 'scaleX(-1)' : 'scaleX(1)';
        const ok = await this.switchToWalk();
        if (ok) this._move();
        else this._scheduleNextWalk();
    }

    _move() {
        const speed = this.layout.speed || 1.5;
        const step = () => {
            const dx = this.targetX - this.posX;
            if (Math.abs(dx) < speed) {
                this.posX = this.targetX;
                this._updatePosition();
                this.el.style.transform = 'scaleX(1)';
                this.switchToIdle();
                this._scheduleNextWalk();
                return;
            }
            this.posX += dx > 0 ? speed : -speed;
            this._updatePosition();
            this.moveRAF = requestAnimationFrame(step);
        };
        this.moveRAF = requestAnimationFrame(step);
    }

    _updatePosition() {
        const L = this.layout;
        const sprW = this.sprite && this.sprite.frameWidth  ? this.sprite.frameWidth  : L.fallbackW;
        const sprH = this.sprite && this.sprite.frameHeight ? this.sprite.frameHeight : L.fallbackH;
        this.el.style.left = this.posX + 'px';
        this.el.style.right = 'auto';
        if (this.labelEl) {
            this.labelEl.style.left = (this.posX + sprW / 2 - 30) + 'px';
            this.labelEl.style.right = 'auto';
            this.labelEl.style.bottom = `calc(${L.bottomPct}% - 14px)`;
        }
        if (this.activityEl) {
            this.activityEl.style.left = (this.posX + sprW / 2 - 9) + 'px';
            this.activityEl.style.right = 'auto';
            this.activityEl.style.bottom = `calc(${L.bottomPct}% + ${sprH}px + 4px)`;
        }
    }

    _rotateActivity() {
        if (!this.activityEl || !this.layout.activities) return;
        const arr = this.layout.activities;
        this.activityEl.textContent = arr[Math.floor(Math.random() * arr.length)];
        setTimeout(() => this._rotateActivity(), (3 + Math.random() * 4) * 1000);
    }
}

// ============================================================
//  Interaction Modal
// ============================================================
class InteractionModal {
    constructor() {
        this.overlay = document.getElementById('interaction-overlay');
        this.modal   = document.getElementById('interaction-modal');
        this.avatarEl    = document.getElementById('modal-avatar');
        this.nameEl      = document.getElementById('modal-name');
        this.bodyEl      = document.getElementById('modal-body');
        this.narrativeEl = document.getElementById('modal-narrative');
        this.closeBtn    = document.getElementById('modal-close');
        this.currentTarget = null;
        this.busy = false;

        this.closeBtn.addEventListener('click', () => this.hide());
        this.overlay.addEventListener('click', e => { if (e.target === this.overlay) this.hide(); });
        document.addEventListener('keydown', e => { if (e.key === 'Escape') this.hide(); });
    }

    show(targetId) {
        const cfg = NPC_ACTIONS[targetId];
        if (!cfg) return;
        this.currentTarget = targetId;
        this.avatarEl.textContent = cfg.avatar;
        this.nameEl.textContent   = cfg.name;
        this.narrativeEl.style.display = 'none';
        this.narrativeEl.innerHTML = '';

        const remainH = 24 - currentGameTime.hour;
        let html = `<div class="modal-desc">${cfg.desc}</div>`;
        for (const a of cfg.actions) {
            const disabled = a.costH > remainH ? 'disabled' : '';
            html += `<button class="action-btn" data-action="${a.code}" ${disabled}>`;
            html += `${a.label}<span class="action-cost">⏱ ${a.cost}</span></button>`;
        }
        this.bodyEl.innerHTML = html;
        this.bodyEl.querySelectorAll('.action-btn').forEach(btn => {
            btn.addEventListener('click', () => this.doAction(btn.dataset.action));
        });
        this.overlay.classList.add('visible');
    }

    hide() { this.overlay.classList.remove('visible'); this.currentTarget = null; }

    async doAction(actionCode) {
        if (this.busy) return;
        this.busy = true;
        this.bodyEl.querySelectorAll('.action-btn').forEach(b => b.disabled = true);

        try {
            const resp = await fetch('/api/demo/action', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ target: this.currentTarget, actionCode })
            });
            const result = await resp.json();

            if (result.success) {
                let nHtml = `<p>${result.narrativeText}</p><div style="margin-top:8px">`;
                if (result.statChanges) {
                    for (const [k, v] of Object.entries(result.statChanges)) {
                        const cls = v >= 0 ? 'stat-pos' : 'stat-neg';
                        nHtml += `<span class="stat-change ${cls}">${STAT_LABELS[k]||k} ${v>=0?'+':''}${v}</span>`;
                    }
                }
                if (result.relationshipChanges) {
                    for (const [k, v] of Object.entries(result.relationshipChanges)) {
                        const cls = v >= 0 ? 'stat-pos' : 'stat-neg';
                        nHtml += `<span class="stat-change ${cls}">${REL_LABELS[k]||k} ${v>=0?'+':''}${v}</span>`;
                    }
                }
                nHtml += '</div>';
                this.narrativeEl.innerHTML = nHtml;
                this.narrativeEl.style.display = 'block';
                spawnStatFloaters(this.currentTarget, result.statChanges);
                if (result.relationshipChanges) {
                    const hasPos = Object.values(result.relationshipChanges).some(v => v > 0);
                    if (hasPos) spawnHeartParticles(this.currentTarget);
                }
                if (result.updatedState) syncFromServerState(result.updatedState);
            } else {
                this.narrativeEl.innerHTML = `<p style="color:#e88080">${result.message}</p>`;
                this.narrativeEl.style.display = 'block';
            }
        } catch (err) {
            this.narrativeEl.innerHTML = '<p style="color:#e88080">Ошибка соединения</p>';
            this.narrativeEl.style.display = 'block';
        }
        this.busy = false;
        setTimeout(() => { if (this.currentTarget) this.show(this.currentTarget); }, 1500);
    }
}

// ============================================================
//  Visual feedback
// ============================================================
const STAT_LABELS = { energy:'⚡', health:'❤️', stress:'😰', mood:'😊', money:'💰', selfEsteem:'⭐' };
const REL_LABELS  = { closeness:'💕 близость', trust:'🤝 доверие', romance:'💘 романтика', stability:'🏠 стабильность', father_closeness:'💕 папа', father_trust:'🤝 папа' };

function spawnStatFloaters(targetId, changes) {
    if (!changes) return;
    const el = document.getElementById(targetId);
    if (!el) return;
    const rect = el.getBoundingClientRect();
    const container = document.getElementById('room-container').getBoundingClientRect();
    let i = 0;
    for (const [k, v] of Object.entries(changes)) {
        const f = document.createElement('div');
        f.className = 'stat-floater ' + (v >= 0 ? 'positive' : 'negative');
        f.textContent = (STAT_LABELS[k]||'') + (v>=0?'+':'') + v;
        f.style.left = (rect.left - container.left + rect.width/2 - 20 + (i-1)*30) + 'px';
        f.style.top  = (rect.top  - container.top  - 10) + 'px';
        document.getElementById('room-container').appendChild(f);
        setTimeout(() => f.remove(), 1600);
        i++;
    }
}

function spawnHeartParticles(targetId) {
    const el = document.getElementById(targetId);
    if (!el) return;
    const rect = el.getBoundingClientRect();
    const container = document.getElementById('room-container').getBoundingClientRect();
    const cx = rect.left - container.left + rect.width/2;
    const cy = rect.top  - container.top  + rect.height/3;
    for (let i = 0; i < 6; i++) {
        const h = document.createElement('div');
        h.className = 'heart-particle';
        h.textContent = '♥';
        const dx = (Math.random()-0.5)*80, dy = -(20+Math.random()*40);
        h.style.cssText = `left:${cx}px;top:${cy}px;--dx:${dx}px;--dy:${dy}px;animation-delay:${i*0.08}s`;
        document.getElementById('room-container').appendChild(h);
        setTimeout(() => h.remove(), 1400);
    }
}

// ============================================================
//  State sync
// ============================================================
let currentGameTime = { day: 1, hour: 8 };

function hearts(c) { const f = Math.round(c/10); return '♥'.repeat(Math.max(0,f)) + '♡'.repeat(Math.max(0,10-f)); }

function setBar(id, v) {
    const b = document.getElementById('bar-'+id), n = document.getElementById('val-'+id);
    const p = Math.min(100, Math.max(0, Math.round(v)));
    if (b) b.style.width = p+'%';
    if (n) n.textContent = v;
}

function syncFromServerState(state) {
    if (state.character && state.character.stats) {
        const s = state.character.stats;
        setBar('t-energy', s.energy); setBar('t-health', s.health);
        setBar('t-stress', s.stress); setBar('t-mood',   s.mood);
        setBar('t-money',  s.money);  setBar('t-esteem', s.selfEsteem);
    }
    if (state.relationships && state.relationships.byNpc) {
        const h = state.relationships.byNpc['HUSBAND'];
        const f = state.relationships.byNpc['FATHER'];
        if (h) document.getElementById('rel-husband').textContent = hearts(h.closeness);
        if (f) document.getElementById('rel-father').textContent  = hearts(f.closeness);
    }
    if (state.gameTime) {
        const prevSlot = getTimeSlot(currentGameTime.hour);
        currentGameTime = state.gameTime;
        document.getElementById('game-time').textContent =
            'День ' + state.gameTime.day + ' | ' + String(state.gameTime.hour).padStart(2,'0') + ':00';
        const newSlot = getTimeSlot(state.gameTime.hour);
        if (newSlot !== prevSlot) actors.forEach(a => a.onTimeSlotChange(newSlot));
    }
    if (state.activeQuests) renderQuests(state.activeQuests);
}

function renderQuests(quests) {
    const container = document.getElementById('quest-list');
    container.innerHTML = '';
    const typeLabel = { SELF_CARE_ARC:'ЗАБОТА О СЕБЕ', FAMILY_HARMONY:'СЕМЬЯ', CAREER_GROWTH:'КАРЬЕРА' };
    for (const q of quests) {
        const div = document.createElement('div');
        div.className = 'quest-item';
        let html = `<span class="quest-type-badge quest-${q.type}">${typeLabel[q.type]||q.type}</span>`;
        html += `<div class="quest-title">${q.title}</div>`;
        html += `<div class="quest-progress-bg"><div class="quest-progress-fill" style="width:${q.progressPercent}%"></div></div>`;
        for (const s of q.steps) {
            html += `<div class="quest-step ${s.completed?'done':''}">${s.description} (${s.current}/${s.required})</div>`;
        }
        div.innerHTML = html;
        if (q.status === 'COMPLETED') div.classList.add('quest-complete-flash');
        container.appendChild(div);
    }
}

// ============================================================
//  Init
// ============================================================
const actors = [];
let modal;

async function init() {
    modal = new InteractionModal();

    for (const [id, layout] of Object.entries(ACTOR_LAYOUTS)) {
        actors.push(new SceneActor(layout));
    }

    ['alexander', 'sam', 'tanya'].forEach(id => {
        document.getElementById(id).addEventListener('click', e => {
            e.stopPropagation();
            modal.show(id);
        });
    });

    const status = await fetchJSON('/api/demo/status');
    if (status) syncFromServerState(status);

    const loading = document.getElementById('loading');
    loading.classList.add('hidden');
    setTimeout(() => loading.remove(), 500);

    setInterval(async () => {
        const s = await fetchJSON('/api/demo/status');
        if (s) syncFromServerState(s);
    }, 10000);
}

window.addEventListener('DOMContentLoaded', init);
