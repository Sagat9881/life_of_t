<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Life of T — Build Status">
  <title>Life of T — Status</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Share+Tech&display=swap" rel="stylesheet">

  <!-- ═══════════════════════════════════════════════════════════════════
       CI INJECTION POINT: metrics.json
       Pipeline replaces this comment with:
         <script id="metrics-data" type="application/json">{...}</script>
       where {...} is the full content of metrics.json
  ══════════════════════════════════════════════════════════════════════ -->
  <!-- METRICS_JSON_PLACEHOLDER -->

  <!-- ═══════════════════════════════════════════════════════════════════
       CI INJECTION POINT: assets-manifest.json
       Pipeline replaces this comment with:
         <script id="assets-manifest-data" type="application/json">{...}</script>
       where {...} is the full content of assets-manifest.json
  ══════════════════════════════════════════════════════════════════════ -->
  <!-- ASSETS_MANIFEST_PLACEHOLDER -->

  <style>
    /* ─── Reset & Base ─────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html {
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      scroll-behavior: smooth;
    }

    /* ─── Design Tokens ────────────────────────────────────────────── */
    :root, [data-theme="dark"] {
      --font-mono: 'Share Tech Mono', 'Courier New', monospace;
      --font-body: 'Share Tech', 'Courier New', monospace;

      --color-bg:            #0d0d0b;
      --color-surface:       #131311;
      --color-surface-2:     #1a1a17;
      --color-surface-3:     #222220;
      --color-border:        #2e2e2b;
      --color-divider:       #252522;

      --color-text:          #d4d4c8;
      --color-text-muted:    #7a7a70;
      --color-text-faint:    #484840;

      --color-primary:       #4fa89b;
      --color-primary-dim:   #2a5e56;
      --color-success:       #6daa45;
      --color-success-dim:   #304d20;
      --color-warning:       #e8a930;
      --color-warning-dim:   #5a3f0e;
      --color-error:         #d95f5f;
      --color-error-dim:     #5a1e1e;
      --color-faint-accent:  #1e2e2c;

      --space-1: 0.25rem;  --space-2: 0.5rem;  --space-3: 0.75rem;
      --space-4: 1rem;     --space-6: 1.5rem;  --space-8: 2rem;
      --space-12: 3rem;    --space-16: 4rem;

      --text-xs:   clamp(0.75rem,  0.7rem  + 0.25vw, 0.875rem);
      --text-sm:   clamp(0.875rem, 0.8rem  + 0.35vw, 1rem);
      --text-base: clamp(1rem,     0.95rem + 0.25vw, 1.125rem);
      --text-lg:   clamp(1.125rem, 1rem    + 0.75vw, 1.5rem);
      --text-xl:   clamp(1.5rem,   1.2rem  + 1.25vw, 2.25rem);

      --transition: 160ms cubic-bezier(0.16, 1, 0.3, 1);

      /* pixel-art: no border radius */
      --radius: 0px;
    }

    [data-theme="light"] {
      --color-bg:            #f5f4ef;
      --color-surface:       #fafaf7;
      --color-surface-2:     #ffffff;
      --color-surface-3:     #ededea;
      --color-border:        #d0d0ca;
      --color-divider:       #e2e2dc;
      --color-text:          #1e1e18;
      --color-text-muted:    #6a6a60;
      --color-text-faint:    #adadaa;
      --color-primary:       #1e7a70;
      --color-primary-dim:   #d0ecea;
      --color-success:       #3a7a18;
      --color-success-dim:   #d4e8c8;
      --color-warning:       #9a6800;
      --color-warning-dim:   #fce8b0;
      --color-error:         #b82020;
      --color-error-dim:     #f8d4d4;
      --color-faint-accent:  #e4f0ee;
    }

    @media (prefers-color-scheme: light) {
      :root:not([data-theme]) {
        --color-bg: #f5f4ef; --color-surface: #fafaf7; --color-surface-2: #ffffff;
        --color-surface-3: #ededea; --color-border: #d0d0ca; --color-divider: #e2e2dc;
        --color-text: #1e1e18; --color-text-muted: #6a6a60; --color-text-faint: #adadaa;
        --color-primary: #1e7a70; --color-primary-dim: #d0ecea;
        --color-success: #3a7a18; --color-success-dim: #d4e8c8;
        --color-warning: #9a6800; --color-warning-dim: #fce8b0;
        --color-error: #b82020; --color-error-dim: #f8d4d4;
        --color-faint-accent: #e4f0ee;
      }
    }

    body {
      min-height: 100dvh;
      font-family: var(--font-body);
      font-size: var(--text-base);
      color: var(--color-text);
      background: var(--color-bg);
      line-height: 1.6;
    }

    img, svg { display: block; max-width: 100%; }
    button { cursor: pointer; background: none; border: none; font: inherit; color: inherit; }
    :focus-visible { outline: 2px solid var(--color-primary); outline-offset: 3px; }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        transition-duration: 0.01ms !important;
      }
    }

    /* ─── Layout ───────────────────────────────────────────────────── */
    .container { max-width: 1200px; margin-inline: auto; padding-inline: var(--space-6); }

    /* ─── Header ───────────────────────────────────────────────────── */
    .site-header {
      position: sticky; top: 0; z-index: 100;
      background: var(--color-surface);
      border-bottom: 1px solid var(--color-border);
    }
    .site-header__inner {
      display: flex; align-items: center; justify-content: space-between;
      padding-block: var(--space-4);
    }
    .site-header__logo {
      display: flex; align-items: center; gap: var(--space-3);
      font-family: var(--font-mono); font-size: var(--text-lg);
      color: var(--color-primary); letter-spacing: 0.05em;
    }
    .site-header__logo svg { color: var(--color-primary); }
    .site-header__meta {
      font-family: var(--font-mono); font-size: var(--text-xs);
      color: var(--color-text-muted);
    }
    .site-header__actions { display: flex; align-items: center; gap: var(--space-3); }
    .btn-icon {
      display: flex; align-items: center; justify-content: center;
      width: 36px; height: 36px;
      border: 1px solid var(--color-border);
      background: var(--color-surface-2);
      color: var(--color-text-muted);
      transition: color var(--transition), background var(--transition), border-color var(--transition);
    }
    .btn-icon:hover { color: var(--color-text); background: var(--color-surface-3); border-color: var(--color-primary); }
    .btn-icon:active { background: var(--color-faint-accent); }

    /* ─── Main ─────────────────────────────────────────────────────── */
    main { padding-block: var(--space-8); }

    /* ─── Error Banner ─────────────────────────────────────────────── */
    .error-banner {
      display: none;
      padding: var(--space-4) var(--space-6);
      margin-bottom: var(--space-6);
      background: var(--color-error-dim);
      border: 1px solid var(--color-error);
      color: var(--color-error);
      font-family: var(--font-mono); font-size: var(--text-sm);
    }
    .error-banner.is-visible { display: block; }
    .error-banner__icon { display: inline; margin-right: var(--space-2); }

    /* ─── Section heading ──────────────────────────────────────────── */
    .section-heading {
      display: flex; align-items: center; gap: var(--space-3);
      margin-bottom: var(--space-6);
      padding-bottom: var(--space-3);
      border-bottom: 1px solid var(--color-divider);
      font-family: var(--font-mono); font-size: var(--text-sm);
      color: var(--color-text-muted); letter-spacing: 0.12em; text-transform: uppercase;
    }
    .section-heading__dot {
      width: 8px; height: 8px;
      background: var(--color-primary);
      flex-shrink: 0;
    }

    /* ─── Overview Cards ───────────────────────────────────────────── */
    .overview-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(min(220px, 100%), 1fr));
      gap: var(--space-4);
      margin-bottom: var(--space-12);
    }
    .stat-card {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      padding: var(--space-6);
      display: flex; flex-direction: column; gap: var(--space-3);
      transition: border-color var(--transition), background var(--transition);
    }
    .stat-card:hover { border-color: var(--color-primary); background: var(--color-faint-accent); }
    .stat-card__label {
      font-family: var(--font-mono); font-size: var(--text-xs);
      color: var(--color-text-muted); letter-spacing: 0.1em; text-transform: uppercase;
    }
    .stat-card__value {
      font-family: var(--font-mono); font-size: var(--text-xl);
      color: var(--color-text); line-height: 1;
    }
    .stat-card__value.is-ok      { color: var(--color-success); }
    .stat-card__value.is-warn    { color: var(--color-warning); }
    .stat-card__value.is-error   { color: var(--color-error); }
    .stat-card__sub {
      font-family: var(--font-mono); font-size: var(--text-xs); color: var(--color-text-muted);
    }

    /* progress bar */
    .progress-wrap {
      width: 100%; height: 8px;
      background: var(--color-surface-3);
      border: 1px solid var(--color-border);
      overflow: hidden;
    }
    .progress-bar {
      height: 100%;
      background: var(--color-success);
      transition: width 600ms steps(10, end);
    }
    .progress-bar.is-warn  { background: var(--color-warning); }
    .progress-bar.is-error { background: var(--color-error); }

    /* ─── Assets Gallery ───────────────────────────────────────────── */
    .gallery-controls {
      display: flex; align-items: center; gap: var(--space-3);
      margin-bottom: var(--space-6); flex-wrap: wrap;
    }
    .filter-btn {
      padding: var(--space-1) var(--space-4);
      border: 1px solid var(--color-border);
      background: var(--color-surface-2);
      font-family: var(--font-mono); font-size: var(--text-xs);
      color: var(--color-text-muted); letter-spacing: 0.08em; text-transform: uppercase;
      transition: color var(--transition), background var(--transition), border-color var(--transition);
    }
    .filter-btn:hover { border-color: var(--color-primary); color: var(--color-text); }
    .filter-btn.is-active {
      background: var(--color-primary-dim); border-color: var(--color-primary);
      color: var(--color-primary);
    }
    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(min(180px, 100%), 1fr));
      gap: var(--space-4);
    }
    .asset-card {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      display: flex; flex-direction: column;
      transition: border-color var(--transition);
      overflow: hidden;
    }
    .asset-card:hover { border-color: var(--color-primary); }
    .asset-card__preview {
      aspect-ratio: 1;
      background: var(--color-surface-3);
      display: flex; align-items: center; justify-content: center;
      font-family: var(--font-mono); font-size: var(--text-xs);
      color: var(--color-text-faint); letter-spacing: 0.1em;
      position: relative; overflow: hidden;
    }
    .asset-card__preview img {
      width: 100%; height: 100%; object-fit: contain;
      image-rendering: pixelated;
    }
    .asset-card__preview .asset-ext {
      position: absolute; bottom: var(--space-2); right: var(--space-2);
      padding: 2px var(--space-1);
      background: var(--color-surface); border: 1px solid var(--color-border);
      font-size: 10px; letter-spacing: 0.05em; color: var(--color-text-muted);
    }
    .asset-card__info {
      padding: var(--space-3) var(--space-4);
      border-top: 1px solid var(--color-divider);
    }
    .asset-card__name {
      font-family: var(--font-mono); font-size: var(--text-xs);
      color: var(--color-text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .asset-card__meta {
      font-family: var(--font-mono); font-size: 10px; color: var(--color-text-faint);
      margin-top: var(--space-1);
    }
    .asset-card.status-ok    { border-top: 2px solid transparent; }
    .asset-card.status-error { border-top: 2px solid var(--color-error); }
    .asset-card.status-warn  { border-top: 2px solid var(--color-warning); }

    /* ─── Empty / Skeleton states ──────────────────────────────────── */
    @keyframes shimmer {
      0%   { background-position: -200% 0; }
      100% { background-position:  200% 0; }
    }
    .skeleton {
      background: linear-gradient(90deg,
        var(--color-surface-2) 25%,
        var(--color-surface-3) 50%,
        var(--color-surface-2) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s ease-in-out infinite;
    }
    .gallery-empty {
      grid-column: 1 / -1;
      padding: var(--space-16) var(--space-8);
      text-align: center;
      font-family: var(--font-mono); font-size: var(--text-sm);
      color: var(--color-text-faint);
    }

    /* ─── Footer ───────────────────────────────────────────────────── */
    .site-footer {
      border-top: 1px solid var(--color-divider);
      padding-block: var(--space-6);
      font-family: var(--font-mono); font-size: var(--text-xs);
      color: var(--color-text-faint);
      display: flex; align-items: center; justify-content: space-between;
      gap: var(--space-4); flex-wrap: wrap;
    }

    /* ─── Responsive ───────────────────────────────────────────────── */
    @media (max-width: 600px) {
      .overview-grid { grid-template-columns: 1fr 1fr; }
      .site-header__meta { display: none; }
    }
    @media (max-width: 380px) {
      .overview-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <a href="#main-content" class="sr-only">Skip to main content</a>

  <!-- ═══ HEADER ═════════════════════════════════════════════════════ -->
  <header class="site-header" role="banner">
    <div class="container">
      <div class="site-header__inner">

        <div class="site-header__logo">
          <!-- SVG logo: pixel-T mark -->
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <rect x="0" y="0" width="24" height="4" fill="currentColor"/>
            <rect x="10" y="4" width="4" height="20" fill="currentColor"/>
          </svg>
          LIFE_OF_T :: STATUS
        </div>

        <div class="site-header__meta" id="build-ts" aria-live="polite">—</div>

        <div class="site-header__actions">
          <button class="btn-icon" id="refresh-btn" aria-label="Refresh data" title="Refresh">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2" aria-hidden="true">
              <polyline points="23 4 23 10 17 10"/>
              <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
            </svg>
          </button>
          <button class="btn-icon" data-theme-toggle aria-label="Switch to light mode" title="Toggle theme">
            <!-- moon icon (dark mode active by default) -->
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2" aria-hidden="true">
              <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
            </svg>
          </button>
        </div>

      </div>
    </div>
  </header>

  <!-- ═══ MAIN ════════════════════════════════════════════════════════ -->
  <main id="main-content">
    <div class="container">

      <!-- Error banner (aria-live so screen readers announce it) -->
      <div id="error-banner" class="error-banner" role="alert" aria-live="assertive">
        <span class="error-banner__icon">[ERROR]</span>
        <span id="error-message">Data unavailable.</span>
      </div>

      <!-- ── Overview Section ──────────────────────────────────────── -->
      <section aria-labelledby="overview-heading">
        <h2 class="section-heading" id="overview-heading">
          <span class="section-heading__dot" aria-hidden="true"></span>
          Overview
        </h2>
        <div class="overview-grid" id="overview-grid" role="list">
          <!-- 5 stat cards injected by JS -->
        </div>
      </section>

      <!-- ── Assets Gallery Section ─────────────────────────────────── -->
      <section aria-labelledby="assets-heading">
        <h2 class="section-heading" id="assets-heading">
          <span class="section-heading__dot" aria-hidden="true"></span>
          Assets Gallery
        </h2>

        <div class="gallery-controls" id="gallery-controls" role="toolbar" aria-label="Filter assets">
          <!-- filter buttons injected by JS -->
        </div>

        <div class="gallery-grid" id="gallery-grid" role="list" aria-label="Asset files">
          <!-- asset cards injected by JS -->
        </div>
      </section>

    </div>
  </main>

  <!-- ═══ FOOTER ══════════════════════════════════════════════════════ -->
  <footer class="site-footer">
    <div class="container">
      <div class="site-footer" style="padding-block: 0;">
        <span>LIFE_OF_T &mdash; build status page</span>
        <span id="footer-env">env: unknown</span>
        <span>generated by CI pipeline</span>
      </div>
    </div>
  </footer>

  <script>
  /* ═══════════════════════════════════════════════════════════════════
     STATUS PAGE — Vanilla ES2020
     Data is injected by CI pipeline via placeholder replacement:
       <!-- METRICS_JSON_PLACEHOLDER -->        →  <script id="metrics-data" type="application/json">{...}<\/script>
       <!-- ASSETS_MANIFEST_PLACEHOLDER -->     →  <script id="assets-manifest-data" type="application/json">{...}<\/script>

     NO external fetch() calls are made. All data comes from the
     injected <script type="application/json"> tags.
  ═══════════════════════════════════════════════════════════════════ */

  (function () {
    'use strict';

    // ── Theme toggle ──────────────────────────────────────────────────
    const root = document.documentElement;
    const toggleBtn = document.querySelector('[data-theme-toggle]');
    let theme = root.getAttribute('data-theme') ||
                (matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
    root.setAttribute('data-theme', theme);

    function setThemeIcon(t) {
      if (!toggleBtn) return;
      toggleBtn.setAttribute('aria-label', 'Switch to ' + (t === 'dark' ? 'light' : 'dark') + ' mode');
      toggleBtn.innerHTML = t === 'dark'
        ? '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>'
        : '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>';
    }
    setThemeIcon(theme);
    toggleBtn && toggleBtn.addEventListener('click', () => {
      theme = theme === 'dark' ? 'light' : 'dark';
      root.setAttribute('data-theme', theme);
      setThemeIcon(theme);
    });

    // ── Read injected JSON data ────────────────────────────────────────
    function readInjectedData(id) {
      const el = document.getElementById(id);
      if (!el) return null;
      try { return JSON.parse(el.textContent); }
      catch (e) { console.error('[status-page] Failed to parse ' + id + ':', e); return null; }
    }

    // ── Error banner ──────────────────────────────────────────────────
    const errorBanner  = document.getElementById('error-banner');
    const errorMessage = document.getElementById('error-message');
    function showError(msg) {
      errorMessage.textContent = msg;
      errorBanner.classList.add('is-visible');
    }
    function hideError() {
      errorBanner.classList.remove('is-visible');
    }

    // ── Helpers ───────────────────────────────────────────────────────
    function esc(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function pct(a, b) { return b > 0 ? Math.round((a / b) * 100) : 0; }

    function threshold(value, warnAt, errorAt) {
      if (value <= errorAt) return 'is-error';
      if (value <= warnAt)  return 'is-warn';
      return 'is-ok';
    }

    function progressBar(value, warnAt, errorAt) {
      const cls   = threshold(value, warnAt, errorAt).replace('is-', '');
      const clsBar = cls !== 'ok' ? 'is-' + cls : '';
      return `
        <div class="progress-wrap" role="progressbar" aria-valuenow="${value}" aria-valuemin="0" aria-valuemax="100" aria-label="${value}%">
          <div class="progress-bar ${clsBar}" style="width:${value}%"></div>
        </div>`;
    }

    function fmtTs(ts) {
      if (!ts) return '—';
      return new Date(ts).toISOString().replace('T', ' ').slice(0, 19) + ' UTC';
    }

    function fmtBytes(bytes) {
      if (bytes === undefined || bytes === null) return '—';
      if (bytes < 1024) return bytes + ' B';
      if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
      return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
    }

    // ── Overview rendering ────────────────────────────────────────────
    function renderOverview(metrics) {
      const grid = document.getElementById('overview-grid');
      grid.innerHTML = '';

      const cards = [
        // 1. Build Status
        (function () {
          const s   = (metrics.build?.status ?? 'unknown').toLowerCase();
          const cls = s === 'ok' || s === 'success' ? 'is-ok' : 'is-error';
          return `
            <div class="stat-card" role="listitem">
              <div class="stat-card__label">Build Status</div>
              <div class="stat-card__value ${cls}">${esc(s.toUpperCase())}</div>
              <div class="stat-card__sub">#${esc(metrics.build?.id ?? '—')} &mdash; ${esc(fmtTs(metrics.build?.ts))}</div>
            </div>`;
        })(),

        // 2. Tests
        (function () {
          const passed = metrics.tests?.passed ?? 0;
          const failed = metrics.tests?.failed ?? 0;
          const total  = metrics.tests?.total  ?? (passed + failed);
          const p      = pct(passed, total);
          const cls    = threshold(p, 95, 80);
          return `
            <div class="stat-card" role="listitem">
              <div class="stat-card__label">Tests</div>
              <div class="stat-card__value ${cls}">${esc(passed)} / ${esc(total)}</div>
              <div class="stat-card__sub">${p}% passed${failed > 0 ? ' &nbsp;&#9888;&nbsp;' + failed + ' failed' : ''}</div>
              ${progressBar(p, 95, 80)}
            </div>`;
        })(),

        // 3. Coverage
        (function () {
          const p   = Math.round(metrics.coverage?.pct ?? 0);
          const cls = threshold(p, 80, 60);
          return `
            <div class="stat-card" role="listitem">
              <div class="stat-card__label">Coverage</div>
              <div class="stat-card__value ${cls}">${p}%</div>
              <div class="stat-card__sub">line coverage</div>
              ${progressBar(p, 80, 60)}
            </div>`;
        })(),

        // 4. Assets
        (function () {
          const gen    = metrics.assets?.generated ?? 0;
          const total  = metrics.assets?.total     ?? 0;
          const errors = metrics.assets?.errors    ?? 0;
          const p      = pct(gen, total);
          const cls    = errors > 0 ? 'is-error' : threshold(p, 100, 80);
          return `
            <div class="stat-card" role="listitem">
              <div class="stat-card__label">Assets</div>
              <div class="stat-card__value ${cls}">${esc(gen)} / ${esc(total)}</div>
              <div class="stat-card__sub">${errors > 0 ? errors + ' error(s)' : 'no errors'}</div>
              ${progressBar(p, 100, 80)}
            </div>`;
        })(),

        // 5. Narrative Specs
        (function () {
          const impl  = metrics.narrative?.implemented ?? 0;
          const specs = metrics.narrative?.specs       ?? 0;
          const p     = pct(impl, specs);
          const cls   = threshold(p, 80, 50);
          return `
            <div class="stat-card" role="listitem">
              <div class="stat-card__label">Narrative Specs</div>
              <div class="stat-card__value ${cls}">${esc(impl)} / ${esc(specs)}</div>
              <div class="stat-card__sub">${p}% implemented</div>
              ${progressBar(p, 80, 50)}
            </div>`;
        })()
      ];

      grid.innerHTML = cards.join('');

      // Update header timestamp and footer env
      document.getElementById('build-ts').textContent = fmtTs(metrics.build?.ts);
      document.getElementById('footer-env').textContent = 'env: ' + esc(metrics.env ?? 'unknown');
    }

    // ── Assets Gallery rendering ──────────────────────────────────────
    let activeFilter = 'all';
    let manifestItems = [];

    function imagePreview(item) {
      const imgExts = ['png', 'jpg', 'jpeg', 'gif', 'webp', 'svg'];
      const ext = (item.path ?? '').split('.').pop().toLowerCase();
      if (imgExts.includes(ext) && item.url) {
        return `<img src="${esc(item.url)}" alt="${esc(item.name ?? item.path)}" loading="lazy" width="180" height="180">`;
      }
      return `<span>${esc(ext.toUpperCase() || 'FILE')}</span>`;
    }

    function renderGallery(items) {
      const grid = document.getElementById('gallery-grid');
      if (!items || items.length === 0) {
        grid.innerHTML = '<div class="gallery-empty" role="listitem">[NO ASSETS FOUND]</div>';
        return;
      }
      grid.innerHTML = items.map(item => {
        const statusCls = item.error ? 'status-error' : (item.warn ? 'status-warn' : 'status-ok');
        const ext = (item.path ?? '').split('.').pop().toLowerCase();
        return `
          <div class="asset-card ${statusCls}" role="listitem" title="${esc(item.path ?? '')}">
            <div class="asset-card__preview">
              ${imagePreview(item)}
              <span class="asset-ext">${esc(ext.toUpperCase())}</span>
            </div>
            <div class="asset-card__info">
              <div class="asset-card__name">${esc(item.name ?? item.path ?? '—')}</div>
              <div class="asset-card__meta">${fmtBytes(item.size)} &bull; ${esc(item.type ?? ext)}</div>
            </div>
          </div>`;
      }).join('');
    }

    function renderFilters(items) {
      const bar = document.getElementById('gallery-controls');
      const types = ['all', ...new Set(
        (items ?? []).map(i => (i.type ?? (i.path ?? '').split('.').pop().toLowerCase()) || 'other')
      )];

      bar.innerHTML = types.map(t => `
        <button class="filter-btn${t === activeFilter ? ' is-active' : ''}" data-type="${esc(t)}"
          aria-pressed="${t === activeFilter}">${esc(t.toUpperCase())}</button>
      `).join('');

      bar.querySelectorAll('.filter-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          activeFilter = btn.dataset.type;
          bar.querySelectorAll('.filter-btn').forEach(b => {
            b.classList.toggle('is-active', b.dataset.type === activeFilter);
            b.setAttribute('aria-pressed', String(b.dataset.type === activeFilter));
          });
          const filtered = activeFilter === 'all'
            ? manifestItems
            : manifestItems.filter(i =>
                (i.type ?? (i.path ?? '').split('.').pop().toLowerCase()) === activeFilter);
          renderGallery(filtered);
        });
      });
    }

    // ── Bootstrap ─────────────────────────────────────────────────────
    function boot() {
      hideError();

      // --- metrics ---
      const metrics = readInjectedData('metrics-data');
      if (!metrics) {
        showError('metrics.json data not injected. Run the CI pipeline to generate this page.');
        // Render empty overview with zeros so the page isn't blank
        renderOverview({});
      } else {
        renderOverview(metrics);
      }

      // --- assets manifest ---
      const manifest = readInjectedData('assets-manifest-data');
      if (!manifest) {
        if (!metrics) {
          // Both missing — single error is enough
        } else {
          showError('assets-manifest.json data not injected. Assets Gallery is unavailable.');
        }
        renderGallery([]);
        renderFilters([]);
      } else {
        manifestItems = Array.isArray(manifest) ? manifest : (manifest.assets ?? []);
        renderFilters(manifestItems);
        renderGallery(manifestItems);
      }
    }

    // Refresh button re-reads injected data (useful if pipeline hot-replaces)
    document.getElementById('refresh-btn').addEventListener('click', boot);

    // Initial render
    boot();

  })();
  </script>

</body>
</html>
